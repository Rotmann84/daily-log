<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tagesplan</title>

<style>

:root{
--bg:#0b1320;
--card:#111c2e;
--card2:#16243c;
--text:#eaf2ff;
--muted:rgba(234,242,255,.75);
--line:rgba(234,242,255,.15);
--accent:#4da3ff;
--accentSoft:rgba(77,163,255,.2);
--shadow:0 10px 30px rgba(0,0,0,.35);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:
radial-gradient(1000px 600px at 10% -10%,rgba(77,163,255,.25),transparent),
radial-gradient(900px 500px at 100% 0%,rgba(77,163,255,.15),transparent),
var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

.app{
width:min(900px,100%);
display:flex;
flex-direction:column;
gap:16px;
}

/* Header */

.header{
background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
border:1px solid var(--line);
border-radius:var(--radius);
padding:16px;
box-shadow:var(--shadow);
}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

h1{
margin:0;
font-size:22px;
}

.date{
font-size:14px;
color:var(--muted);
}

.progressWrap{
background:rgba(0,0,0,.25);
border:1px solid var(--line);
height:14px;
border-radius:999px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#4da3ff,#7cc4ff);
transition:width .2s;
}

/* Buttons */

.controls{
display:flex;
gap:10px;
}

button{
border:1px solid var(--line);
background:rgba(255,255,255,.05);
color:var(--text);
padding:10px 14px;
border-radius:14px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:rgba(255,255,255,.08);
}

.btnPrimary{
background:var(--accentSoft);
border-color:rgba(77,163,255,.35);
}

/* Rows */

.card{
border:1px solid var(--line);
border-radius:var(--radius);
padding:12px;
background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
}

.rows{
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:30px 110px 1fr 60px 40px;
gap:10px;
align-items:center;
padding:10px;
background:rgba(0,0,0,.2);
border:1px solid var(--line);
border-radius:14px;
}

.row.done{
background:rgba(77,163,255,.15);
}

.drag{
cursor:grab;
text-align:center;
font-size:18px;
}

input[type="text"],
input[type="time"]{
width:100%;
background:rgba(255,255,255,.05);
border:1px solid var(--line);
color:var(--text);
border-radius:10px;
padding:8px;
}

.check{
display:flex;
justify-content:center;
}

input[type="checkbox"]{
width:28px;
height:28px;
accent-color:#4da3ff;
cursor:pointer;
}

.del{
cursor:pointer;
text-align:center;
font-size:18px;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0f1c30;
border:1px solid var(--line);
padding:12px 18px;
border-radius:14px;
opacity:0;
transition:.2s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="titleRow">
<h1>Tagesplan</h1>
<div class="date" id="date"></div>
</div>

<div class="progressWrap">
<div class="progressBar" id="progress"></div>
</div>
</div>

<div class="controls">
<button class="btnPrimary" onclick="addRow()">+ Zeile</button>
<button onclick="clearPlan()">Reset</button>
</div>

<div class="card">
<div class="rows" id="rows"></div>
</div>

</div>

<div class="toast" id="toast">🎉 Du hast es geschafft.</div>

<script>

const rowsEl = document.getElementById("rows")
const progress = document.getElementById("progress")
const toast = document.getElementById("toast")

const key = "dayplan"

let items = JSON.parse(localStorage.getItem(key) || "[]")

function save(){
localStorage.setItem(key,JSON.stringify(items))
}

function render(){

rowsEl.innerHTML=""

items.forEach((item,i)=>{

const row=document.createElement("div")
row.className="row"+(item.done?" done":"")

row.draggable=true

row.innerHTML=`
<div class="drag">≡</div>
<input type="time" value="${item.time||""}">
<input type="text" value="${item.task||""}" placeholder="Tätigkeit">
<div class="check"><input type="checkbox" ${item.done?"checked":""}></div>
<div class="del">✕</div>
`

const time=row.children[1]
const task=row.children[2]
const check=row.querySelector("input[type=checkbox]")
const del=row.children[4]

time.oninput=()=>{item.time=time.value;save()}
task.oninput=()=>{item.task=task.value;save()}

check.onchange=()=>{
item.done=check.checked
save()
render()
updateProgress()
}

del.onclick=()=>{
items.splice(i,1)
save()
render()
updateProgress()
}

row.ondragstart=e=>{
e.dataTransfer.setData("index",i)
}

row.ondragover=e=>{
e.preventDefault()
}

row.ondrop=e=>{
let from=e.dataTransfer.getData("index")
let to=i
items.splice(to,0,items.splice(from,1)[0])
save()
render()
}

rowsEl.appendChild(row)

})

updateProgress()

}

function addRow(){
items.push({time:"",task:"",done:false})
save()
render()
}

function clearPlan(){
items=[]
save()
render()
}

function updateProgress(){

let total=items.length
let done=items.filter(i=>i.done).length

let pct=total?done/total*100:0
progress.style.width=pct+"%"

if(total>0 && done===total){
toast.classList.add("show")
setTimeout(()=>toast.classList.remove("show"),2000)
}

}

function setDate(){
let d=new Date()
document.getElementById("date").innerText=d.toLocaleDateString("de-DE",{
weekday:"short",
day:"2-digit",
month:"2-digit",
year:"numeric"
})
}

setDate()

/* Reset um Mitternacht */

setInterval(()=>{
let now=new Date()
if(now.getHours()===0 && now.getMinutes()===0){
localStorage.removeItem(key)
items=[]
render()
}
},60000)

render()

</script>

</body>
</html>
