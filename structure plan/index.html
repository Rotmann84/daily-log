<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b2b1a" />
  <title>Tagesplan</title>
  <style>
    :root{
      --bg:#0b2b1a;
      --card:#0f3a23;
      --card2:#114529;
      --text:#e9fff0;
      --muted:rgba(233,255,240,.75);
      --line:rgba(233,255,240,.18);
      --accent:#55d17c;
      --danger:#ff6b6b;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(85,209,124,.25), transparent 60%),
                  radial-gradient(900px 500px at 100% 10%, rgba(85,209,124,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:18px;
    }
    .app{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    /* Header */
    .header{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding:16px 16px 14px;
      box-shadow: var(--shadow);
    }
    .titleRow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
    }
    h1{
      font-size: 22px;
      margin:0;
      letter-spacing:.2px;
    }
    .date{
      font-size:14px;
      color:var(--muted);
      white-space:nowrap;
      user-select:none;
    }
    .progressRow{
      margin-top:10px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .progressWrap{
      flex:1;
      background: rgba(0,0,0,.25);
      border:1px solid var(--line);
      border-radius: 999px;
      height:14px;
      overflow:hidden;
    }
    .progressBar{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(85,209,124,.75), rgba(85,209,124,1));
      transition: width .18s ease;
    }
    .progressText{
      font-size:13px;
      color:var(--muted);
      min-width:92px;
      text-align:right;
      user-select:none;
    }

    /* Controls */
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color:var(--text);
      border-radius: 14px;
      padding:10px 12px;
      font-size:14px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      user-select:none;
    }
    button:hover{ background: rgba(255,255,255,.09); border-color: rgba(233,255,240,.28); }
    button:active{ transform: translateY(1px); }
    .btnPrimary{
      background: rgba(85,209,124,.18);
      border-color: rgba(85,209,124,.35);
    }
    .btnDanger{
      background: rgba(255,107,107,.14);
      border-color: rgba(255,107,107,.28);
    }

    /* Table/Card */
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding:12px;
      box-shadow: var(--shadow);
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .row{
      display:grid;
      grid-template-columns: 34px 110px 1fr 66px 40px;
      gap:10px;
      align-items:center;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(233,255,240,.14);
      border-radius: 16px;
      padding:10px 10px;
      min-height:56px;
    }
    .row.done{
      background: rgba(85,209,124,.16);
      border-color: rgba(85,209,124,.28);
    }
    .row.dragOver{
      outline: 2px dashed rgba(85,209,124,.75);
      outline-offset: 3px;
    }

    .dragHandle{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(233,255,240,.14);
      cursor: grab;
      user-select:none;
      font-size:18px;
      line-height:1;
      opacity:.9;
    }
    .dragHandle:active{ cursor: grabbing; }

    input[type="time"], input[type="text"]{
      width:100%;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(233,255,240,.18);
      border-radius: 12px;
      padding:10px 10px;
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input[type="text"]::placeholder{ color: rgba(233,255,240,.55); }
    input[type="time"]{
      padding:9px 10px;
    }

    /* Big checkbox */
    .checkWrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }
    input[type="checkbox"]{
      width:30px;
      height:30px;
      accent-color: var(--accent);
      cursor:pointer;
    }

    .delBtn{
      width:40px;
      height:40px;
      border-radius: 14px;
      display:grid;
      place-items:center;
      background: rgba(255,107,107,.12);
      border:1px solid rgba(255,107,107,.24);
      cursor:pointer;
      user-select:none;
    }
    .delBtn:hover{ background: rgba(255,107,107,.18); border-color: rgba(255,107,107,.35); }
    .delBtn:active{ transform: translateY(1px); }

    .hint{
      margin:10px 2px 0;
      color: var(--muted);
      font-size: 13px;
    }

    /* Toast */
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(233,255,240,.22);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events:none;
      transition: opacity .18s ease, transform .18s ease;
      display:flex;
      align-items:center;
      gap:10px;
      max-width: min(680px, calc(100% - 24px));
    }
    .toast.show{
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }
    .toastIcon{
      width:28px;
      height:28px;
      border-radius: 12px;
      background: rgba(85,209,124,.2);
      border: 1px solid rgba(85,209,124,.35);
      display:grid;
      place-items:center;
      font-size: 16px;
      flex: 0 0 auto;
    }
    .toastText{
      font-size: 14px;
      color: rgba(233,255,240,.92);
    }

    /* Responsive */
    @media (max-width: 720px){
      .row{
        grid-template-columns: 34px 98px 1fr 60px 40px;
      }
    }
    @media (max-width: 520px){
      h1{ font-size: 20px; }
      .row{
        grid-template-columns: 34px 1fr 66px 40px;
        grid-template-areas:
          "drag task check del"
          "drag time check del";
      }
      .dragHandle{ grid-area: drag; }
      .taskInput{ grid-area: task; }
      .timeInput{ grid-area: time; }
      .checkWrap{ grid-area: check; }
      .delBtn{ grid-area: del; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="titleRow">
        <h1>Tagesplan</h1>
        <div class="date" id="dateText"></div>
      </div>
      <div class="progressRow">
        <div class="progressWrap" aria-label="Fortschritt">
          <div class="progressBar" id="progressBar"></div>
        </div>
        <div class="progressText" id="progressText">0 / 0</div>
      </div>
    </div>

    <div class="controls">
      <button class="btnPrimary" id="addRowBtn">+ Zeile hinzufügen</button>
      <button class="btnDanger" id="clearBtn" title="Alles löschen">Heute löschen</button>
    </div>

    <div class="card">
      <div class="rows" id="rows"></div>
      <div class="hint">Tipp: Ziehen &amp; Ablegen am Griff (≡), große Haken zum schnellen Abhaken.</div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="toastIcon">✓</div>
    <div class="toastText" id="toastText">Du hast es geschafft.</div>
  </div>

<script>
(() => {
  // ----- Helpers -----
  const $ = (sel) => document.querySelector(sel);
  const rowsEl = $("#rows");
  const progressBar = $("#progressBar");
  const progressText = $("#progressText");
  const dateText = $("#dateText");
  const toast = $("#toast");
  const toastText = $("#toastText");

  const pad2 = (n) => String(n).padStart(2, "0");
  const todayKey = () => {
    const d = new Date();
    // local date key YYYY-MM-DD
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };
  const storageKey = () => `dayplan-${todayKey()}`;

  const formatDateDE = () => {
    const d = new Date();
    return d.toLocaleDateString("de-DE", { weekday:"short", year:"numeric", month:"2-digit", day:"2-digit" });
  };

  // ----- State -----
  /** @type {{id:string,time:string,task:string,done:boolean}[]} */
  let items = [];
  let dragSrcId = null;
  let completedToastShown = false;

  // ----- Storage -----
  const load = () => {
    try {
      const raw = localStorage.getItem(storageKey());
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .filter(x => x && typeof x === "object")
        .map(x => ({
          id: String(x.id || crypto.randomUUID()),
          time: typeof x.time === "string" ? x.time : "",
          task: typeof x.task === "string" ? x.task : "",
          done: Boolean(x.done),
        }));
    } catch {
      return [];
    }
  };

  const save = () => {
    try {
      localStorage.setItem(storageKey(), JSON.stringify(items));
    } catch {
      // ignore quota errors for now
    }
  };

  // Simple debounce to avoid saving on every keystroke too aggressively
  let saveTimer = null;
  const saveSoon = () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 120);
  };

  // ----- UI -----
  const showToast = (msg) => {
    toastText.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
  };

  const updateProgress = () => {
    const total = items.length;
    const done = items.filter(x => x.done).length;

    progressText.textContent = `${done} / ${total}`;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressBar.style.width = `${pct}%`;

    // Motivation only when fully checked AND there is at least 1 item
    if (total > 0 && done === total) {
      if (!completedToastShown) {
        completedToastShown = true;
        showToast("🎉 Du hast es geschafft.");
      }
    } else {
      completedToastShown = false;
    }
  };

  const render = () => {
    rowsEl.innerHTML = "";

    for (const it of items) {
      const row = document.createElement("div");
      row.className = "row" + (it.done ? " done" : "");
      row.draggable = true;
      row.dataset.id = it.id;

      // Drag handle
      const drag = document.createElement("div");
      drag.className = "dragHandle";
      drag.title = "Ziehen zum Sortieren";
      drag.textContent = "≡";

      // Time
      const time = document.createElement("input");
      time.className = "timeInput";
      time.type = "time";
      time.value = it.time || "";
      time.placeholder = "Uhrzeit";

      // Task
      const task = document.createElement("input");
      task.className = "taskInput";
      task.type = "text";
      task.value = it.task || "";
      task.placeholder = "Tätigkeit";

      // Checkbox
      const checkWrap = document.createElement("div");
      checkWrap.className = "checkWrap";
      const check = document.createElement("input");
      check.type = "checkbox";
      check.checked = !!it.done;
      checkWrap.appendChild(check);

      // Delete
      const del = document.createElement("div");
      del.className = "delBtn";
      del.title = "Zeile löschen";
      del.textContent = "✕";

      // Append
      row.appendChild(drag);
      row.appendChild(time);
      row.appendChild(task);
      row.appendChild(checkWrap);
      row.appendChild(del);

      // Events: edits
      time.addEventListener("input", () => {
        it.time = time.value;
        saveSoon();
      });
      task.addEventListener("input", () => {
        it.task = task.value;
        saveSoon();
      });
      check.addEventListener("change", () => {
        it.done = check.checked;
        row.classList.toggle("done", it.done);
        saveSoon();
        updateProgress();
      });
      del.addEventListener("click", () => {
        items = items.filter(x => x.id !== it.id);
        saveSoon();
        render();
        updateProgress();
      });

      // Drag & Drop (HTML5)
      row.addEventListener("dragstart", (e) => {
        dragSrcId = it.id;
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", it.id);
        // Slightly nicer ghost image behavior:
        try { e.dataTransfer.setDragImage(row, 20, 20); } catch {}
      });

      row.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        row.classList.add("dragOver");
      });

      row.addEventListener("dragleave", () => row.classList.remove("dragOver"));

      row.addEventListener("drop", (e) => {
        e.preventDefault();
        row.classList.remove("dragOver");
        const srcId = e.dataTransfer.getData("text/plain") || dragSrcId;
        const dstId = row.dataset.id;
        if (!srcId || !dstId || srcId === dstId) return;

        const srcIndex = items.findIndex(x => x.id === srcId);
        const dstIndex = items.findIndex(x => x.id === dstId);
        if (srcIndex < 0 || dstIndex < 0) return;

        const [moved] = items.splice(srcIndex, 1);
        items.splice(dstIndex, 0, moved);

        saveSoon();
        render();
        updateProgress();
      });

      row.addEventListener("dragend", () => {
        row.classList.remove("dragOver");
      });

      rowsEl.appendChild(row);
    }
  };

  const addRow = (prefillTime = "", prefillTask = "") => {
    items.push({
      id: crypto.randomUUID(),
      time: prefillTime,
      task: prefillTask,
      done: false
    });
    saveSoon();
    render();
    updateProgress();

    // Focus last task input for quick entry
    const lastRow = rowsEl.lastElementChild;
    const lastTask = lastRow?.querySelector('input[type="text"]');
    lastTask?.focus();
  };

  const clearToday = () => {
    if (!confirm("Wirklich den heutigen Tagesplan löschen?")) return;
    items = [];
    completedToastShown = false;
    localStorage.removeItem(storageKey());
    render();
    updateProgress();
  };

  // ----- Init -----
  dateText.textContent = formatDateDE();
  items = load();
  render();
  updateProgress();

  $("#addRowBtn").addEventListener("click", () => addRow());
  $("#clearBtn").addEventListener("click", clearToday);

  // Convenience: Enter in task field adds a new row when you're on the last row
  rowsEl.addEventListener("keydown", (e) => {
    const isEnter = e.key === "Enter";
    if (!isEnter) return;
    const target = e.target;
    if (!(target instanceof HTMLElement)) return;

    // Only when typing in task field
    if (target.matches('input[type="text"].taskInput')) {
      e.preventDefault();
      const row = target.closest(".row");
      if (row && row === rowsEl.lastElementChild) addRow();
      else {
        // focus next row task input if exists
        const all = Array.from(rowsEl.querySelectorAll('.row'));
        const idx = all.indexOf(row);
        const next = all[idx+1];
        next?.querySelector('input[type="text"].taskInput')?.focus();
      }
    }
  });

})();
</script>
</body>
</html>
