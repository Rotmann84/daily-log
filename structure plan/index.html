<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0c1424" />
  <title>Tagesplan</title>

  <style>
    :root{
      --bg:#0c1424;
      --card:#121d33;
      --card2:#0f182a;
      --line:rgba(255,255,255,.10);
      --text:#e8f0ff;
      --muted:rgba(232,240,255,.72);

      --accent:#3f8cff;
      --accentSoft:rgba(63,140,255,.22);

      /* DONE = grün (wie gewünscht) */
      --done:#39d98a;
      --doneSoft:rgba(57,217,138,.18);
      --doneLine:rgba(57,217,138,.28);

      --danger:#ff6b6b;
      --dangerSoft:rgba(255,107,107,.14);

      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 600px at 20% -10%, rgba(63,140,255,.25), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(63,140,255,.15), transparent 55%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:min(920px, 100%);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    /* Header */
    .header{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }

    .titleRow{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    .date{
      font-size:14px;
      color:var(--muted);
      white-space:nowrap;
      user-select:none;
    }

    .progressTopRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }

    .progressLabel{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }

    .progressWrap{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      height:12px;
    }

    .progressBar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #3f8cff, #66a9ff);
      transition:width .2s ease;
    }

    /* Controls */
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      transition: background .15s ease, transform .05s ease, border-color .15s ease;
      user-select:none;
    }
    button:hover{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.16); }
    button:active{ transform:translateY(1px); }

    .btnPrimary{
      background:var(--accentSoft);
      border-color:rgba(63,140,255,.35);
    }

    .btnGhost{
      background:transparent;
      border-color:rgba(255,255,255,.12);
      color:var(--muted);
    }
    .btnGhost:hover{
      background:rgba(255,255,255,.06);
      color:var(--text);
    }

    /* Card + rows */
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      box-shadow:var(--shadow);
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    /* Row layout: time small, title big, trash */
    .row{
      display:grid;
      grid-template-columns: 96px 1fr 44px;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius:16px;
      background:var(--card2);
      border:1px solid var(--line);
      min-height:56px;
      cursor:pointer;
      transition: background .12s ease, border-color .12s ease, transform .05s ease;
    }
    .row:active{ transform:translateY(1px); }

    .row.done{
      background:var(--doneSoft);
      border-color:var(--doneLine);
    }

    /* “Input, aber clean”: keine harten Kanten, wirkt wie Text */
    .timeWrap{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }

    .timeInput{
      width:100%;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      color:var(--text);
      outline:none;
      font-size:14px;
      padding:10px 10px;
      font-variant-numeric: tabular-nums;
      cursor:text;
    }

    .timeSuffix{
      font-size:12px;
      color:var(--muted);
      user-select:none;
      white-space:nowrap;
    }

    .titleInput{
      width:100%;
      background:transparent;
      border:1px solid transparent;
      border-radius:12px;
      color:var(--text);
      outline:none;
      font-size:15px;
      padding:10px 10px;
      cursor:text;
    }
    .titleInput::placeholder{
      color: rgba(232,240,255,.55);
    }

    .row.done .titleInput{
      color: rgba(232,240,255,.95);
    }

    /* Trash */
    .trashBtn{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(255,255,255,.10);
      background:var(--dangerSoft);
      transition: background .15s ease, border-color .15s ease, transform .05s ease;
      font-size:18px;
      line-height:1;
    }
    .trashBtn:hover{
      background:rgba(255,107,107,.18);
      border-color:rgba(255,107,107,.28);
    }
    .trashBtn:active{ transform:translateY(1px); }

    /* Toast */
    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:#101b2f;
      border:1px solid var(--line);
      padding:12px 16px;
      border-radius:14px;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease, transform .18s ease;
      max-width:min(720px, calc(100% - 24px));
      color:var(--text);
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    @media (max-width:520px){
      .row{ grid-template-columns: 92px 1fr 44px; }
      h1{ font-size:20px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="titleRow">
        <h1>Tagesplan</h1>
        <div class="date" id="dateText"></div>
      </div>

      <div class="progressTopRow">
        <div class="progressLabel" id="progressText">0 / 0 erledigt</div>
        <div class="progressLabel" id="hintText">Tippen auf Zeile = erledigt</div>
      </div>

      <div class="progressWrap" aria-label="Fortschritt">
        <div class="progressBar" id="progressBar"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btnPrimary" id="addBtn">+ Zeile</button>
      <button class="btnGhost" id="resetBtn" title="Plan für heute löschen">Reset</button>
    </div>

    <div class="card">
      <div class="rows" id="rows"></div>
    </div>
  </div>

  <div class="toast" id="toast">🎉 Du hast es geschafft.</div>

<script>
(() => {
  const rowsEl = document.getElementById("rows");
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");
  const dateText = document.getElementById("dateText");
  const toast = document.getElementById("toast");

  // --- Date + keys ---
  const pad2 = (n) => String(n).padStart(2, "0");

  const localDateKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };

  const storageKeyForToday = () => `dayplan-${localDateKey()}`;

  const formatDateDE = () => {
    const d = new Date();
    return d.toLocaleDateString("de-DE", { weekday:"short", day:"2-digit", month:"2-digit", year:"numeric" });
  };

  // --- State ---
  let key = storageKeyForToday();
  /** @type {{id:string,time:string,title:string,done:boolean}[]} */
  let items = [];
  let completedToastShown = false;

  // --- Storage ---
  const load = () => {
    try{
      const raw = localStorage.getItem(key);
      if(!raw) return [];
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr)) return [];
      return arr.map(x => ({
        id: String(x.id || crypto.randomUUID()),
        time: typeof x.time === "string" ? x.time : "",
        title: typeof x.title === "string" ? x.title : "",
        done: Boolean(x.done),
      }));
    }catch{
      return [];
    }
  };

  const save = () => { try { localStorage.setItem(key, JSON.stringify(items)); } catch {} };

  let saveTimer = null;
  const saveSoon = () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 120);
  };

  // --- Time helpers ---
  const normalizeTime = (val) => {
    if (!val) return "";
    const s = String(val).trim();

    // Accept "9", "930", "9:3", "09:30", "9.30" etc.
    const digits = s.replace(/[^\d]/g, "");
    if (digits.length === 1 || digits.length === 2) {
      const hh = Number(digits);
      if (Number.isFinite(hh) && hh >= 0 && hh <= 23) return `${pad2(hh)}:00`;
      return "";
    }
    if (digits.length === 3) {
      const hh = Number(digits.slice(0,1));
      const mm = Number(digits.slice(1));
      if (hh >= 0 && hh <= 23 && mm >= 0 && mm <= 59) return `${pad2(hh)}:${pad2(mm)}`;
      return "";
    }
    if (digits.length >= 4) {
      const hh = Number(digits.slice(0,2));
      const mm = Number(digits.slice(2,4));
      if (hh >= 0 && hh <= 23 && mm >= 0 && mm <= 59) return `${pad2(hh)}:${pad2(mm)}`;
      return "";
    }

    const m = /^(\d{1,2}):(\d{1,2})$/.exec(s);
    if (m) {
      const hh = Number(m[1]);
      const mm = Number(m[2]);
      if (hh >= 0 && hh <= 23 && mm >= 0 && mm <= 59) return `${pad2(hh)}:${pad2(mm)}`;
    }
    return "";
  };

  const timeToMinutes = (t) => {
    if (!t || typeof t !== "string") return Infinity;
    const m = /^(\d{2}):(\d{2})$/.exec(t.trim());
    if (!m) return Infinity;
    const hh = Number(m[1]);
    const mm = Number(m[2]);
    if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return Infinity;
    return hh * 60 + mm;
  };

  const sortByTime = () => {
    // stable sort
    items = items
      .map((it, idx) => ({...it, _idx: idx}))
      .sort((a,b) => {
        const da = timeToMinutes(a.time);
        const db = timeToMinutes(b.time);
        if (da !== db) return da - db;
        return a._idx - b._idx;
      })
      .map(({_idx, ...rest}) => rest);
  };

  const nextQuarterTime = () => {
    const d = new Date();
    const m = d.getMinutes();
    const q = Math.ceil((m + 1) / 15) * 15; // next quarter (or same if exactly on boundary +1)
    d.setMinutes(q, 0, 0);
    // if q became 60, Date will roll hour automatically
    return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  };

  // --- UI helpers ---
  const showToast = (msg) => {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
  };

  const updateProgress = () => {
    const total = items.length;
    const done = items.filter(x => x.done).length;
    progressText.textContent = `${done} / ${total} erledigt`;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressBar.style.width = `${pct}%`;

    if (total > 0 && done === total) {
      if (!completedToastShown) {
        completedToastShown = true;
        showToast("🎉 Du hast es geschafft.");
      }
    } else {
      completedToastShown = false;
    }
  };

  const render = () => {
    rowsEl.innerHTML = "";

    for (const it of items) {
      const row = document.createElement("div");
      row.className = "row" + (it.done ? " done" : "");
      row.dataset.id = it.id;

      // Time block (input + "Uhr")
      const timeWrap = document.createElement("div");
      timeWrap.className = "timeWrap";

      const time = document.createElement("input");
      time.className = "timeInput";
      time.type = "text";
      time.inputMode = "numeric";
      time.placeholder = "hh:mm";
      time.value = it.time || "";

      const suffix = document.createElement("span");
      suffix.className = "timeSuffix";
      suffix.textContent = "Uhr";

      timeWrap.appendChild(time);
      timeWrap.appendChild(suffix);

      const title = document.createElement("input");
      title.className = "titleInput";
      title.type = "text";
      title.placeholder = "Titel / Tätigkeit";
      title.value = it.title || "";

      const trash = document.createElement("div");
      trash.className = "trashBtn";
      trash.title = "Zeile löschen";
      trash.textContent = "🗑";

      // Toggle done on row click (but NOT when clicking inputs or trash)
      row.addEventListener("click", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest(".trashBtn")) return;
        if (target.closest("input")) return;

        it.done = !it.done;
        row.classList.toggle("done", it.done);
        saveSoon();
        updateProgress();
      });

      // Keep inputs usable without toggling done
      time.addEventListener("click", (e) => e.stopPropagation());
      title.addEventListener("click", (e) => e.stopPropagation());
      trash.addEventListener("click", (e) => e.stopPropagation());

      time.addEventListener("input", () => {
        it.time = time.value;
        saveSoon();
      });

      time.addEventListener("blur", () => {
        const normalized = normalizeTime(time.value);
        it.time = normalized;
        time.value = normalized;
        sortByTime();
        saveSoon();
        render();
      });

      title.addEventListener("input", () => {
        it.title = title.value;
        saveSoon();
      });

      trash.addEventListener("click", () => {
        items = items.filter(x => x.id !== it.id);
        saveSoon();
        render();
      });

      row.appendChild(timeWrap);
      row.appendChild(title);
      row.appendChild(trash);
      rowsEl.appendChild(row);
    }

    updateProgress();
  };

  // --- Actions ---
  const addRow = () => {
    const t = nextQuarterTime();
    items.push({ id: crypto.randomUUID(), time: t, title: "", done: false });
    sortByTime();
    saveSoon();
    render();

    // focus the title of the newly added row with that time (best-effort)
    // (pick last matching id in DOM)
    const lastRow = rowsEl.querySelector(`.row[data-id="${items.find(x=>x.time===t && x.title==="" && !x.done)?.id || ""}"]`);
    lastRow?.querySelector(".titleInput")?.focus();
  };

  const resetToday = () => {
    if (!confirm("Wirklich den heutigen Tagesplan löschen?")) return;
    items = [];
    completedToastShown = false;
    try { localStorage.removeItem(key); } catch {}
    render();
  };

  // --- Day rollover reset (00:00) ---
  const ensureTodayKey = () => {
    const newKey = storageKeyForToday();
    if (newKey !== key) {
      key = newKey;
      items = [];
      completedToastShown = false;
      render();
    }
  };

  const scheduleMidnightReset = () => {
    const now = new Date();
    const next = new Date(now);
    next.setHours(24,0,0,0); // next midnight
    const ms = next.getTime() - now.getTime();

    setTimeout(() => {
      ensureTodayKey();
      scheduleMidnightReset();
    }, ms + 50);
  };

  // Keyboard: Enter in title -> add row
  rowsEl.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const el = e.target;
    if (!(el instanceof HTMLElement)) return;
    if (el.classList.contains("titleInput")) {
      e.preventDefault();
      addRow();
    }
  });

  // --- Init ---
  dateText.textContent = formatDateDE();
  items = load();
  sortByTime();
  render();
  scheduleMidnightReset();
  setInterval(ensureTodayKey, 60 * 1000);

  document.getElementById("addBtn").addEventListener("click", addRow);
  document.getElementById("resetBtn").addEventListener("click", resetToday);

})();
</script>
</body>
</html>
