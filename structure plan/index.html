<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tagesplan</title>

<style>

:root{
--bg:#0c1424;
--card:#121d33;
--line:rgba(255,255,255,.1);
--text:#e8f0ff;
--accent:#3f8cff;
--accentSoft:rgba(63,140,255,.25);
--radius:16px;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:radial-gradient(circle at 20% -10%,rgba(63,140,255,.25),transparent),var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.app{
width:min(900px,100%);
display:flex;
flex-direction:column;
gap:16px;
}

.header{
background:var(--card);
padding:16px;
border-radius:var(--radius);
border:1px solid var(--line);
}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

h1{
margin:0;
font-size:22px;
}

.date{
font-size:14px;
opacity:.8;
}

.progressBarWrap{
background:#0b1220;
border-radius:20px;
overflow:hidden;
height:12px;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#3f8cff,#66a9ff);
}

.progressText{
margin-top:6px;
font-size:12px;
opacity:.7;
}

.controls{
display:flex;
gap:10px;
}

button{
background:var(--accentSoft);
border:1px solid var(--accent);
color:var(--text);
padding:8px 14px;
border-radius:12px;
cursor:pointer;
}

.card{
background:var(--card);
padding:12px;
border-radius:var(--radius);
border:1px solid var(--line);
}

.rows{
display:flex;
flex-direction:column;
gap:8px;
}

.row{
display:grid;
grid-template-columns:30px 110px 1fr 60px 40px;
gap:10px;
align-items:center;
padding:10px;
border-radius:12px;
background:#0f182a;
border:1px solid var(--line);
}

.row.done{
background:rgba(63,140,255,.15);
}

.drag{
cursor:grab;
font-size:18px;
text-align:center;
}

input{
background:#0c1424;
border:1px solid var(--line);
color:var(--text);
border-radius:8px;
padding:6px;
}

input[type="checkbox"]{
width:26px;
height:26px;
accent-color:var(--accent);
cursor:pointer;
}

.del{
cursor:pointer;
text-align:center;
font-size:18px;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#121d33;
border:1px solid var(--line);
padding:12px 18px;
border-radius:12px;
opacity:0;
transition:.2s;
}

.toast.show{
opacity:1;
}

</style>

</head>
<body>

<div class="app">

<div class="header">

<div class="titleRow">
<h1>Tagesplan</h1>
<div class="date" id="date"></div>
</div>

<div class="progressBarWrap">
<div class="progressBar" id="progressBar"></div>
</div>

<div class="progressText" id="progressText">0 / 0 erledigt</div>

</div>

<div class="controls">
<button onclick="addRow()">+ Zeile</button>
<button onclick="clearPlan()">Reset</button>
</div>

<div class="card">
<div class="rows" id="rows"></div>
</div>

</div>

<div class="toast" id="toast">🎉 Du hast alles geschafft.</div>

<script>

const rows=document.getElementById("rows")
const progressBar=document.getElementById("progressBar")
const progressText=document.getElementById("progressText")
const toast=document.getElementById("toast")

function todayKey(){
let d=new Date()
return "plan-"+d.toISOString().split("T")[0]
}

let key=todayKey()

let items=JSON.parse(localStorage.getItem(key)||"[]")

function save(){
localStorage.setItem(key,JSON.stringify(items))
}

function render(){

rows.innerHTML=""

items.forEach((item,i)=>{

let row=document.createElement("div")
row.className="row"+(item.done?" done":"")

row.draggable=true

row.innerHTML=`
<div class="drag">≡</div>
<input type="time" value="${item.time}">
<input type="text" value="${item.task}" placeholder="Tätigkeit">
<input type="checkbox" ${item.done?"checked":""}>
<div class="del">✕</div>
`

let time=row.children[1]
let task=row.children[2]
let check=row.children[3]
let del=row.children[4]

time.oninput=()=>{item.time=time.value;save()}
task.oninput=()=>{item.task=task.value;save()}

check.onchange=()=>{
item.done=check.checked
save()
render()
updateProgress()
}

del.onclick=()=>{
items.splice(i,1)
save()
render()
}

row.ondragstart=e=>{
e.dataTransfer.setData("index",i)
}

row.ondragover=e=>e.preventDefault()

row.ondrop=e=>{
let from=e.dataTransfer.getData("index")
let to=i
items.splice(to,0,items.splice(from,1)[0])
save()
render()
}

rows.appendChild(row)

})

updateProgress()

}

function addRow(){
items.push({time:"",task:"",done:false})
save()
render()
}

function clearPlan(){
items=[]
save()
render()
}

function updateProgress(){

let total=items.length
let done=items.filter(i=>i.done).length

progressBar.style.width=(total?done/total*100:0)+"%"

progressText.innerText=`${done} / ${total} erledigt`

if(total>0 && done===total){
toast.classList.add("show")
setTimeout(()=>toast.classList.remove("show"),2000)
}

}

function setDate(){
let d=new Date()
document.getElementById("date").innerText=
d.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"})
}

setDate()

/* Tageswechsel automatisch erkennen */

setInterval(()=>{

let newKey=todayKey()

if(newKey!==key){

key=newKey
items=[]
render()

}

},60000)

render()

</script>

</body>
</html>
