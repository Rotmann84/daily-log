<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#101827" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lärmprotokoll" />
<title>Lärmprotokoll</title>

<style>
:root {
  --bg: #101827;
  --bg2: #172033;
  --card: #1f2937;
  --field: #263244;
  --line: #3a4658;
  --text: #f3f4f6;
  --muted: #aeb7c5;
  --accent: #4f8cff;
  --green: #18a84a;
  --danger: #dc2626;
}

* { box-sizing: border-box; }

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  color: var(--text);
}

.app {
  max-width: 680px;
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + 32px) 16px 44px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 29px;
  line-height: 1.05;
  letter-spacing: -0.5px;
}

.header-actions {
  display: flex;
  gap: 10px;
}

.icon-btn {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(31,41,55,0.92);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.icon-btn svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
}

.card {
  background: rgba(31,41,55,0.94);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  column-gap: 12px;
  row-gap: 14px;
}

.field-group {
  min-width: 0;
}

.field-group.full {
  grid-column: 1 / -1;
}

label {
  display: block;
  color: var(--muted);
  font-size: 14px;
  margin: 0 0 7px;
}

input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: var(--field);
  color: var(--text);
  font-size: 15px;
  padding: 0 11px;
  min-height: 44px;
}

input[type="date"],
input[type="time"] {
  text-align: center;
}

textarea {
  padding: 11px 12px;
  min-height: 78px;
  resize: vertical;
  line-height: 1.35;
}

.button-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0 16px;
}

button {
  border: none;
  border-radius: 14px;
  min-height: 48px;
  padding: 11px 14px;
  font-size: 16px;
  font-weight: 750;
  color: white;
}

.primary { background: var(--accent); }
.success { background: var(--green); }
.secondary { background: #536174; }
.danger { background: var(--danger); }

.save-btn {
  width: 100%;
  margin-top: 2px;
}

.checkline {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 18px;
}

.checkline input {
  width: 24px;
  min-height: 24px;
  height: 24px;
  flex: 0 0 24px;
}

.checkline label {
  margin: 0;
  font-size: 15px;
}

.subtle-toggle {
  width: 100%;
  min-height: 44px;
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--muted);
  font-size: 15px;
}

.hidden {
  display: none;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.section-title {
  font-size: 20px;
  font-weight: 850;
}

.muted {
  color: var(--muted);
  font-size: 14px;
}

.entry {
  border: 1px solid var(--line);
  background: #182234;
  border-radius: 15px;
  margin-top: 10px;
  overflow: hidden;
}

.entry-summary {
  padding: 13px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  cursor: pointer;
}

.entry-title {
  font-size: 15px;
  font-weight: 800;
}

.entry-meta {
  color: var(--muted);
  font-size: 13px;
  margin-top: 4px;
}

.entry-type {
  background: #334155;
  color: var(--text);
  border-radius: 999px;
  padding: 5px 9px;
  font-size: 12px;
  white-space: nowrap;
}

.entry-details {
  display: none;
  border-top: 1px solid var(--line);
  padding: 14px;
}

.entry.open .entry-details {
  display: block;
}

.note-preview {
  margin-top: 8px;
  color: #d9dee7;
  font-size: 14px;
  line-height: 1.35;
}

.history {
  margin-top: 12px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 20px 8px;
}

@media (max-width: 430px) {
  .app {
    padding-left: 14px;
    padding-right: 14px;
  }

  .card {
    padding: 15px;
  }

  h1 {
    font-size: 28px;
  }

  .form-grid {
    column-gap: 10px;
    row-gap: 13px;
  }

  input, select, textarea {
    font-size: 15px;
    min-height: 43px;
  }

  button {
    min-height: 47px;
    font-size: 15px;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
  }
}
</style>
</head>

<body>
<div class="app">

<header class="header">
  <h1>Lärmprotokoll</h1>

  <div class="header-actions">
    <button class="icon-btn" onclick="exportCSV()" title="CSV exportieren" aria-label="CSV exportieren">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M5 21h14"></path>
      </svg>
    </button>

    <button class="icon-btn" onclick="importCSV()" title="CSV importieren" aria-label="CSV importieren">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21V9"></path>
        <path d="M7 14l5-5 5 5"></path>
        <path d="M5 3h14"></path>
      </svg>
    </button>
  </div>
</header>

<section class="card">
  <div class="form-grid">
    <div class="field-group">
      <label>Datum</label>
      <input type="date" id="date">
    </div>

    <div class="field-group">
      <label>Art</label>
      <select id="type"></select>
    </div>

    <div class="field-group">
      <label>Anfang</label>
      <input type="time" id="start">
    </div>

    <div class="field-group">
      <label>Ende</label>
      <input type="time" id="end">
    </div>

    <div class="field-group full">
      <div class="button-grid">
        <button class="success" onclick="setNow('start')">Start jetzt</button>
        <button class="secondary" onclick="setNow('end')">Ende jetzt</button>
      </div>
    </div>

    <div class="field-group full">
      <label>Anmerkungen</label>
      <textarea id="note" placeholder="Was war zu hören? Wie laut? Wo wahrnehmbar? Dauer? Besonderheiten?"></textarea>
    </div>
  </div>

  <div class="checkline">
    <input type="checkbox" id="authority">
    <label for="authority">Polizei/Ordnungsamt informiert</label>
  </div>

  <button class="primary save-btn" onclick="addEntry()">Eintrag speichern</button>
</section>

<section class="card">
  <button class="subtle-toggle" onclick="toggleTypeManager()">+ Art der Belästigung verwalten</button>
  <div id="typeManager" class="hidden" style="margin-top:12px;">
    <div class="field-group">
      <label>Weitere Art ergänzen</label>
      <input type="text" id="newType" placeholder="z. B. Laute Gespräche, Maschinenlärm">
    </div>
    <button class="secondary save-btn" onclick="addType()">Art ergänzen</button>
  </div>
</section>

<section class="card">
  <div class="section-head">
    <div class="section-title">Log-Einträge</div>
    <div class="muted" id="count"></div>
  </div>
  <div id="log"></div>
</section>

</div>

<script>
const ENTRY_KEY = "noiseLogEntries_v5";
const TYPE_KEY = "noiseLogTypes_v5";

let entries = JSON.parse(localStorage.getItem(ENTRY_KEY) || "[]");
let types = JSON.parse(localStorage.getItem(TYPE_KEY) || "[]");

const defaultTypes = ["Gartenarbeit", "Hundelärm", "Musik", "Sonstiges"];

function today() {
  return new Date().toISOString().slice(0, 10);
}

function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function timestamp() {
  const d = new Date();
  return d.toLocaleString("de-DE", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  });
}

function save() {
  localStorage.setItem(ENTRY_KEY, JSON.stringify(entries));
  localStorage.setItem(TYPE_KEY, JSON.stringify(types));
  render();
}

function init() {
  document.getElementById("date").value = today();
  if (!types.length) types = [...defaultTypes];
  renderTypes();
  render();
}

function renderTypes() {
  const select = document.getElementById("type");
  select.innerHTML = "";

  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    select.appendChild(opt);
  });
}

function toggleTypeManager() {
  document.getElementById("typeManager").classList.toggle("hidden");
}

function addType() {
  const input = document.getElementById("newType");
  const value = input.value.trim();

  if (!value) return;

  if (types.includes(value)) {
    alert("Diese Art ist bereits vorhanden.");
    return;
  }

  types.push(value);
  input.value = "";
  save();
}

function setNow(field) {
  document.getElementById("date").value ||= today();
  document.getElementById(field).value = nowTime();
}

function addEntry() {
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const type = document.getElementById("type").value;
  const note = document.getElementById("note").value.trim();
  const authority = document.getElementById("authority").checked;

  if (!date || !start) {
    alert("Datum und Anfangszeit sind erforderlich.");
    return;
  }

  entries.push({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
    createdAt: timestamp(),
    updatedAt: timestamp(),
    date,
    start,
    end,
    type,
    note,
    authority,
    history: [`${timestamp()}: Eintrag erstellt`]
  });

  clearForm();
  save();
}

function clearForm() {
  document.getElementById("date").value = today();
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";
  document.getElementById("note").value = "";
  document.getElementById("authority").checked = false;
}

function updateEntry(id, field, value) {
  const e = entries.find(x => x.id === id);
  if (!e) return;

  if (e[field] === value) return;

  e[field] = value;
  e.updatedAt = timestamp();

  const labels = {
    date: "Datum",
    start: "Anfang",
    end: "Ende",
    type: "Art",
    note: "Anmerkung",
    authority: "Polizei/Ordnungsamt informiert"
  };

  e.history = e.history || [];
  e.history.push(`${timestamp()}: ${labels[field] || field} geändert`);
  save();
}

function deleteEntry(id) {
  if (!confirm("Eintrag wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.")) return;
  entries = entries.filter(e => e.id !== id);
  save();
}

function toggleEntry(id) {
  const el = document.getElementById("entry-" + id);
  if (el) el.classList.toggle("open");
}

function render() {
  renderTypes();

  const log = document.getElementById("log");
  const count = document.getElementById("count");

  const sorted = [...entries].sort((a, b) => {
    return `${b.date || ""} ${b.start || ""}`.localeCompare(`${a.date || ""} ${a.start || ""}`);
  });

  count.textContent = sorted.length === 1 ? "1 Eintrag" : `${sorted.length} Einträge`;

  if (!sorted.length) {
    log.innerHTML = `<div class="empty">Noch keine Einträge vorhanden.</div>`;
    return;
  }

  log.innerHTML = sorted.map(e => `
    <div class="entry" id="entry-${escapeAttr(e.id)}">
      <div class="entry-summary" onclick="toggleEntry('${escapeAttr(e.id)}')">
        <div>
          <div class="entry-title">${escapeHTML(formatDate(e.date))} · ${escapeHTML(e.start || "-")}–${escapeHTML(e.end || "offen")}</div>
          <div class="entry-meta">
            ${e.authority ? "Behörde informiert · " : ""}zuletzt geändert: ${escapeHTML(e.updatedAt || "-")}
          </div>
          ${e.note ? `<div class="note-preview">${escapeHTML(shorten(e.note, 90))}</div>` : ""}
        </div>
        <div class="entry-type">${escapeHTML(e.type || "-")}</div>
      </div>

      <div class="entry-details">
        <div class="form-grid">
          <div class="field-group">
            <label>Datum</label>
            <input type="date" value="${escapeAttr(e.date || "")}" onchange="updateEntry('${escapeAttr(e.id)}', 'date', this.value)">
          </div>

          <div class="field-group">
            <label>Art</label>
            <select onchange="updateEntry('${escapeAttr(e.id)}', 'type', this.value)">
              ${types.map(t => `<option value="${escapeAttr(t)}" ${t === e.type ? "selected" : ""}>${escapeHTML(t)}</option>`).join("")}
            </select>
          </div>

          <div class="field-group">
            <label>Anfang</label>
            <input type="time" value="${escapeAttr(e.start || "")}" onchange="updateEntry('${escapeAttr(e.id)}', 'start', this.value)">
          </div>

          <div class="field-group">
            <label>Ende</label>
            <input type="time" value="${escapeAttr(e.end || "")}" onchange="updateEntry('${escapeAttr(e.id)}', 'end', this.value)">
          </div>

          <div class="field-group full">
            <label>Anmerkung bearbeiten</label>
            <textarea onchange="updateEntry('${escapeAttr(e.id)}', 'note', this.value)">${escapeHTML(e.note || "")}</textarea>
          </div>
        </div>

        <div class="checkline">
          <input type="checkbox" ${e.authority ? "checked" : ""} onchange="updateEntry('${escapeAttr(e.id)}', 'authority', this.checked)">
          <label>Polizei/Ordnungsamt informiert</label>
        </div>

        <div class="history">
          Erstellt: ${escapeHTML(e.createdAt || "-")}<br>
          Zuletzt geändert: ${escapeHTML(e.updatedAt || "-")}<br><br>
          Änderungsverlauf:<br>
          ${(e.history || []).map(h => `• ${escapeHTML(h)}`).join("<br>")}
        </div>

        <button class="danger save-btn" style="margin-top:12px;" onclick="deleteEntry('${escapeAttr(e.id)}')">Eintrag löschen</button>
      </div>
    </div>
  `).join("");
}

function formatDate(value) {
  if (!value) return "-";
  const [y, m, d] = value.split("-");
  return `${d}.${m}.${y}`;
}

function shorten(text, max) {
  if (!text) return "";
  return text.length > max ? text.slice(0, max).trim() + "…" : text;
}

function escapeHTML(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(str) {
  return escapeHTML(str);
}

function csvEscape(value) {
  const v = value === undefined || value === null ? "" : String(value);
  return `"${v.replaceAll('"', '""')}"`;
}

function exportCSV() {
  const header = [
    "ID",
    "Erstellt am",
    "Zuletzt geändert",
    "Datum",
    "Anfang",
    "Ende",
    "Art",
    "Anmerkung",
    "Polizei/Ordnungsamt informiert",
    "Änderungsverlauf"
  ];

  const rows = entries.map(e => [
    e.id,
    e.createdAt,
    e.updatedAt,
    e.date,
    e.start,
    e.end,
    e.type,
    e.note,
    e.authority ? "ja" : "nein",
    (e.history || []).join(" | ")
  ]);

  const csv = [header, ...rows]
    .map(row => row.map(csvEscape).join(";"))
    .join("\n");

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `laermprotokoll_${today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"' && quote && next === '"') {
      cell += '"';
      i++;
    } else if (c === '"') {
      quote = !quote;
    } else if (c === ";" && !quote) {
      row.push(cell);
      cell = "";
    } else if ((c === "\n" || c === "\r") && !quote) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if (c === "\r" && next === "\n") i++;
    } else {
      cell += c;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function importCSV() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".csv,text/csv";

  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {
      if (!confirm("CSV importieren? Bestehende Einträge werden ersetzt.")) return;

      const rows = parseCSV(reader.result).filter(r => r.length > 1);
      rows.shift();

      entries = rows.map(r => {
        const type = r[6] || "Sonstiges";
        if (type && !types.includes(type)) types.push(type);

        return {
          id: r[0] || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
          createdAt: r[1] || timestamp(),
          updatedAt: r[2] || timestamp(),
          date: r[3] || "",
          start: r[4] || "",
          end: r[5] || "",
          type,
          note: r[7] || "",
          authority: (r[8] || "").toLowerCase() === "ja" || (r[8] || "").toLowerCase() === "true",
          history: r[9] ? r[9].split(" | ") : [`${timestamp()}: aus CSV importiert`]
        };
      });

      save();
    };

    reader.readAsText(file);
  };

  input.click();
}

init();
</script>
</body>
</html>
