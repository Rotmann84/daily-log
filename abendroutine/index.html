<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Fitness</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fitness" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f2a1f" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <style>
    :root{
      --bg:#0f2a1f;
      --bg2:#0b231a;

      --panel:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.10);

      --fg:#eef6f1;
      --muted:rgba(238,246,241,0.70);

      --accent:#b9a26a;
      --accent2:#d6c289;

      --ok:#36c26a;
      --warn:#f2b84b;
      --none:rgba(255,255,255,0.18);

      --shadow:0 14px 34px rgba(0,0,0,0.35);
      --radius:18px;

      --mk-evening-full:#D6C289;
      --mk-evening-full-b:#b9a26a;

      --mk-evening-light:#3ED1C4;
      --mk-evening-light-b:#2fb3a7;

      --mk-gym-v1:#B58CFF;
      --mk-gym-v1-b:#8F6BFF;

      --mk-gym-v2:#FF7FB0;
      --mk-gym-v2-b:#d96290;

      --mk-bike:#F29C38;
      --mk-bike-b:#d88426;

      --homeFrame: rgba(54,194,106,0.16);
      --homeFrameB: rgba(54,194,106,0.28);
      --homeFrameHi: rgba(54,194,106,0.22);
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    html{ background:var(--bg); overscroll-behavior:none; }
    body{
      margin:0;
      min-height:100%;
      background:transparent;
      color:var(--fg);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background:
        radial-gradient(1200px 650px at 20% 0%, rgba(185,162,106,0.10), transparent 55%),
        radial-gradient(900px 520px at 90% 15%, rgba(54,194,106,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    .app{
      max-width:740px;
      margin:0 auto;
      min-height:100dvh;
      padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px) 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    header{
      padding:18px 0 6px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    h1{
      margin:0;
      font-size:20px;
      font-weight:950;
      letter-spacing:.3px;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill, .datePill{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.06);
      font-weight:900;
      font-size:12px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select:none;
    }

    .pill{
      cursor:pointer;
      color:var(--fg);
      transition: transform .04s ease, background .12s ease, border-color .12s ease;
    }
    .pill:active{ transform:scale(.99); }
    .pill.gold{
      border-color: rgba(185,162,106,0.35);
      color: var(--accent2);
      background: rgba(185,162,106,0.12);
    }
    .pill.active{
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.12);
    }

    .datePill{ color: var(--muted); }

    .panel{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;

      position:relative;
      overflow:hidden;
      overflow:clip;
      clip-path: inset(0 round var(--radius));
      contain: paint;
      isolation:isolate;
    }

    .page{ display:none; padding-bottom:18px; }
    .page.active{ display:block; animation: fade .12s ease; }
    @keyframes fade{ from{opacity:.3; transform: translateY(2px);} to{opacity:1; transform: translateY(0);} }

    .homeRow{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
      padding: 6px 0 8px;
      align-items:stretch;
    }

    .homeAction{
      border-radius: 18px;
      border: 1px solid var(--homeFrameB);
      background:
        radial-gradient(900px 300px at 50% 0%, var(--homeFrameHi), transparent 62%),
        var(--homeFrame);
      box-shadow: 0 10px 26px rgba(0,0,0,0.24);
      padding: 14px 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      cursor:pointer;
      user-select:none;
      transition: transform .05s ease, border-color .12s ease, background .12s ease;
      min-height: 76px;
    }
    .homeAction:active{ transform: scale(.99); }
    .homeAction:hover{ border-color: rgba(54,194,106,0.38); }

    .homeIcon{
      width:44px; height:44px;
      border-radius: 14px;
      display:grid;
      place-items:center;
      background: rgba(0,0,0,0.10);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
      font-size: 22px;
    }

    .homeText{
      font-weight: 950;
      letter-spacing:.2px;
      font-size: 15px;
      color: var(--fg);
      white-space: nowrap;
    }

    .sectionMeta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }

    .weightCard{
      padding:12px 14px;
      border-radius:16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.05);
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .weightTop{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
    }

    .weightValue{
      font-size:20px;
      font-weight:950;
      line-height:1;
    }

    .weightRow{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .weightInput{
      width:120px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color:var(--fg);
      font-size:14px;
      font-weight:800;
    }

    .bar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .barLeft{ display:flex; flex-direction:column; gap:4px; }
    .barTitle{ margin:0; font-size:16px; font-weight:950; letter-spacing:.2px; }
    .barMeta{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      font-size:12px; color: var(--muted); font-weight:850;
    }

    .dot{
      width:9px; height:9px; border-radius:50%;
      display:inline-block;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.15);
    }
    .dot.ok{ background: var(--ok); }
    .dot.warn{ background: var(--warn); }
    .dot.none{ background: var(--none); }

    .list{ display:flex; flex-direction:column; gap:10px; }

    .item{
      border:1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      user-select:none;
      transition: transform .04s ease;
    }
    .item:active{ transform: scale(.995); }

    .left{ display:flex; flex-direction:column; gap:4px; min-width:0; }
    .name{ font-weight: 950; letter-spacing:.2px; }
    .meta{ font-size: 13px; color: var(--muted); font-weight: 820; }

    .right{
      display:flex;
      align-items:center;
      gap:10px;
      flex: 0 0 auto;
    }

    .check{
      width:26px; height:26px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,0.18);
      display:grid;
      place-items:center;
      font-size:15px;
      color: transparent;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    .done{
      background: rgba(54,194,106,0.12);
      border-color: rgba(54,194,106,0.35);
    }
    .done .check{
      border-color: rgba(54,194,106,0.85);
      background: rgba(54,194,106,0.95);
      color:#0a1f16;
    }

    .trash{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.10);
      color: rgba(238,246,241,0.85);
      cursor:pointer;
      font-size: 16px;
      font-weight: 900;
      display:grid;
      place-items:center;
      transition: transform .04s ease;
    }
    .trash:active{ transform: scale(.99); }

    .empty{
      text-align:center;
      color: var(--muted);
      font-weight:850;
      padding: 14px 10px;
    }

    .calHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 12px;
    }
    .calTitle{ font-weight:950; font-size:16px; letter-spacing:.2px; }

    .navBtn{
      width:40px; height:40px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--fg);
      cursor:pointer;
      font-size:18px;
      font-weight:950;
    }

    .calGrid{
      width:100%;
      max-width:100%;
      display:grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap:8px;
    }

    .dow{
      text-align:center;
      font-size:11px;
      color: var(--muted);
      font-weight:900;
      padding: 4px 0;
    }

    .dayCell{
      min-width:0;
      aspect-ratio: 1 / 1;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      padding:8px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:6px;
      min-height:44px;
      cursor:pointer;
    }
    .dayCell:active{ transform: scale(.995); }
    .dayCell.out{ opacity:0.35; cursor:default; }
    .dayTop{ display:flex; justify-content:space-between; gap:6px; align-items:flex-start; }
    .dayNum{ font-weight:950; font-size:12px; }

    .markers{
      display:flex;
      gap:3px;
      justify-content:flex-end;
      align-items:center;
      flex-wrap:wrap;
    }

    .mk{
      width:8px; height:8px;
      border-radius:3px;
      border:1px solid rgba(255,255,255,0.20);
    }
    .mk.evening-full{ background: var(--mk-evening-full); border-color: var(--mk-evening-full-b); }
    .mk.evening-light{ background: var(--mk-evening-light); border-color: var(--mk-evening-light-b); }
    .mk.gym-v1{ background: var(--mk-gym-v1); border-color: var(--mk-gym-v1-b); }
    .mk.gym-v2{ background: var(--mk-gym-v2); border-color: var(--mk-gym-v2-b); }
    .mk.bike{ background: var(--mk-bike); border-color: var(--mk-bike-b); }

    dialog{
      border:none;
      border-radius: 20px;
      padding:0;
      width:min(640px, 96vw);
      background: transparent;
    }

    dialog::backdrop{
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal{
      background: linear-gradient(180deg, rgba(19,47,35,0.98), rgba(15,42,31,0.98));
      border: 1px solid rgba(185,162,106,0.30);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .modal h2{
      margin:0 0 10px;
      font-size:18px;
      font-weight:950;
      letter-spacing:.3px;
      color: var(--accent2);
      text-shadow: 0 1px 0 rgba(0,0,0,0.35);
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:10px 0 6px;
      font-weight:900;
    }

    input{
      width:100%;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: var(--fg);
      font-size:14px;
      outline:none;
      font-weight:800;
    }

    .row{ display:flex; gap:10px; }

    .actionsRow{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:14px;
    }

    .btn{
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      cursor:pointer;
      font-weight:950;
      background: rgba(255,255,255,0.06);
      color: var(--fg);
    }

    .btn.primary{
      background: rgba(185,162,106,0.18);
      border-color: rgba(185,162,106,0.45);
      color: var(--accent2);
    }

    .statsGrid{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px 12px;
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,0.08);
      font-weight:900;
      font-size:13px;
      color: var(--fg);
    }
    .statsGrid .k{ color: var(--muted); font-weight:900; }
    .statsGrid .v{ text-align:right; }

    @media (max-width: 520px){
      .homeRow{ grid-template-columns: 1fr; }
      .homeAction{ justify-content:flex-start; padding: 14px 14px; }
      .homeText{ font-size: 16px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1 id="headerTitle">Fitness</h1>
      <div class="actions">
        <span class="datePill" id="datePill">—</span>

        <button class="pill" id="subModeA" type="button" style="display:none;"></button>
        <button class="pill" id="subModeB" type="button" style="display:none;"></button>

        <button class="pill" id="statsBtn" type="button" style="display:none;">Statistik</button>
        <button class="pill" id="backBtn" type="button" style="display:none;">Zurück</button>
        <button class="pill gold" id="calendarBtn" type="button">Kalender</button>
      </div>
    </header>

    <section class="page active" id="homePage">
      <div class="panel">
        <div class="homeRow">
          <button class="homeAction" id="eveningMenuBtn" type="button">
            <div class="homeIcon">🌙</div>
            <div class="homeText">Abendroutine</div>
          </button>

          <button class="homeAction" id="gymMenuBtn" type="button">
            <div class="homeIcon">🏛️</div>
            <div class="homeText">Fitnesscenter</div>
          </button>

          <button class="homeAction" id="bikeBtn" type="button">
            <div class="homeIcon">🚴</div>
            <div class="homeText">Biking</div>
          </button>
        </div>
      </div>
    </section>

    <section class="page" id="workoutPage">
      <div class="panel">
        <div class="sectionMeta" id="gymWeightSection" style="display:none;">
          <div class="weightCard">
            <div class="weightTop">Startgewicht</div>
            <div class="weightValue" id="startWeightValue">—</div>
            <div class="weightRow">
              <input class="weightInput" id="startWeightInput" type="number" step="0.1" placeholder="z. B. 87.5" />
              <button class="pill gold" id="saveWeightBtn" type="button">Speichern</button>
            </div>
          </div>
        </div>

        <div class="bar">
          <div class="barLeft">
            <p class="barTitle" id="workoutTitle">Set</p>
            <div class="barMeta">
              <span class="dot" id="todayDot"></span>
              <span id="todayText">—</span>
              <span id="modeText" style="font-weight:950;"></span>
            </div>
          </div>

          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
            <span class="pill" id="progressPill">0/0</span>
            <button class="pill gold" id="addExerciseBtn" type="button">+ Übung</button>
          </div>
        </div>

        <div class="list" id="exerciseList"></div>
        <div class="empty" id="exerciseEmpty" style="display:none;">Noch keine Übungen.</div>
      </div>
    </section>

    <section class="page" id="calendarPage">
      <div class="panel">
        <div class="calHeader">
          <div class="calTitle" id="calTitle">Monat</div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="navBtn" id="prevMonth" type="button" aria-label="Vorheriger Monat">‹</button>
            <button class="navBtn" id="nextMonth" type="button" aria-label="Nächster Monat">›</button>
          </div>
        </div>

        <div class="calGrid" aria-hidden="true">
          <div class="dow">Mo</div><div class="dow">Di</div><div class="dow">Mi</div><div class="dow">Do</div><div class="dow">Fr</div><div class="dow">Sa</div><div class="dow">So</div>
        </div>
        <div class="calGrid" id="calGrid"></div>
      </div>
    </section>
  </div>

  <!-- Abendroutine Dialog -->
  <dialog id="eveningDlg">
    <div class="modal">
      <h2>Neue Übung</h2>

      <label>Name</label>
      <input id="eveningName" placeholder="z. B. Kettlebell Swings" />

      <div class="row">
        <div style="flex:1;">
          <label>Sets</label>
          <input id="eveningSets" type="number" min="1" max="30" value="1" />
        </div>
        <div style="flex:1;">
          <label>Wiederholungen</label>
          <input id="eveningReps" type="number" min="1" max="1000" value="10" />
        </div>
      </div>

      <div class="actionsRow">
        <button class="btn" id="eveningCancel" type="button">Abbrechen</button>
        <button class="btn primary" id="eveningSave" type="button">Speichern</button>
      </div>
    </div>
  </dialog>

  <!-- Fitnesscenter Dialog -->
  <dialog id="gymDlg">
    <div class="modal">
      <h2>Neue Übung</h2>

      <label>Name</label>
      <input id="gymName" placeholder="z. B. Brustpresse" />

      <label>Gerätenummer</label>
      <input id="gymMachine" placeholder="z. B. 12" />

      <div class="row">
        <div style="flex:1;">
          <label>Sätze</label>
          <input id="gymSets" type="number" min="1" max="30" value="3" />
        </div>
        <div style="flex:1;">
          <label>Wiederholungen</label>
          <input id="gymReps" type="number" min="1" max="1000" value="10" />
        </div>
      </div>

      <div class="actionsRow">
        <button class="btn" id="gymCancel" type="button">Abbrechen</button>
        <button class="btn primary" id="gymSave" type="button">Speichern</button>
      </div>
    </div>
  </dialog>

  <dialog id="statsDlg">
    <div class="modal">
      <h2>Statistik</h2>

      <div style="color:var(--muted); font-weight:900; font-size:12px;" id="statsSub">—</div>
      <div class="statsGrid" id="statsGridMonth"></div>

      <div style="height:1px; background: rgba(255,255,255,0.08); margin: 14px 0 12px 0;"></div>

      <div style="color:var(--muted); font-weight:900; font-size:12px; margin-bottom:6px;" id="statsYearTitle">
        Jahresstatistik für das laufende Jahr
      </div>
      <div class="statsGrid" id="statsGridYear"></div>

      <div class="actionsRow">
        <button class="btn primary" id="closeStats" type="button">Schließen</button>
      </div>
    </div>
  </dialog>

  <dialog id="dayDlg">
    <div class="modal">
      <h2 id="dayDlgTitle">Tag</h2>
      <div id="dayDlgList" class="list" style="margin-top:10px;"></div>
      <div class="actionsRow">
        <button class="btn primary" id="dayDlgClose" type="button">Schließen</button>
      </div>
    </div>
  </dialog>

  <script>
    "use strict";

    const KEY = "fitness_app_v1";
    const $ = (id) => document.getElementById(id);

    const todayKey = (d = new Date()) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };
    const ymd = (d) => todayKey(d);

    const niceDate = () => {
      const fmt = new Intl.DateTimeFormat("de-DE", { weekday:"short", day:"2-digit", month:"2-digit", year:"numeric" });
      return fmt.format(new Date());
    };

    const fmtDay = (d) => new Intl.DateTimeFormat("de-DE", {
      weekday:"long", day:"2-digit", month:"2-digit", year:"numeric"
    }).format(d);

    const monthTitle = (d) => {
      const fmt = new Intl.DateTimeFormat("de-DE", { month:"long", year:"numeric" });
      const t = fmt.format(d);
      return t.charAt(0).toUpperCase() + t.slice(1);
    };

    const escapeHtml = (s) => String(s)
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");

    const load = () => {
      const raw = localStorage.getItem(KEY);
      if (!raw) {
        return {
          evening: { full: [], light: [] },
          gym: { v1: [], v2: [], startWeight: "" },
          logs: []
        };
      }
      try { return JSON.parse(raw); }
      catch {
        return {
          evening: { full: [], light: [] },
          gym: { v1: [], v2: [], startWeight: "" },
          logs: []
        };
      }
    };

    let state = load();

    const saveState = () => localStorage.setItem(KEY, JSON.stringify(state));

    const normalizeState = () => {
      if (!state.evening) state.evening = { full: [], light: [] };
      if (!Array.isArray(state.evening.full)) state.evening.full = [];
      if (!Array.isArray(state.evening.light)) state.evening.light = [];

      if (!state.gym) state.gym = { v1: [], v2: [], startWeight: "" };
      if (!Array.isArray(state.gym.v1)) state.gym.v1 = [];
      if (!Array.isArray(state.gym.v2)) state.gym.v2 = [];
      if (typeof state.gym.startWeight !== "string") state.gym.startWeight = state.gym.startWeight == null ? "" : String(state.gym.startWeight);

      if (!Array.isArray(state.logs)) state.logs = [];
    };
    normalizeState();

    // logs:
    // {
    //   dateKey,
    //   bike:boolean,
    //   evening:null|'full'|'light',
    //   gym:null|'v1'|'v2',
    //   completed:{
    //     evening:{ full:[], light:[] },
    //     gym:{ v1:[], v2:[] }
    //   }
    // }
    const ensureLog = (dateKey) => {
      let log = state.logs.find(l => l.dateKey === dateKey);
      if (!log) {
        log = {
          dateKey,
          bike: false,
          evening: null,
          gym: null,
          completed: {
            evening: { full: [], light: [] },
            gym: { v1: [], v2: [] }
          }
        };
        state.logs.unshift(log);
      }

      if (!("bike" in log)) log.bike = false;
      if (!("evening" in log)) log.evening = null;
      if (!("gym" in log)) log.gym = null;
      if (!log.completed) {
        log.completed = {
          evening: { full: [], light: [] },
          gym: { v1: [], v2: [] }
        };
      }
      if (!log.completed.evening) log.completed.evening = { full: [], light: [] };
      if (!log.completed.gym) log.completed.gym = { v1: [], v2: [] };

      if (!Array.isArray(log.completed.evening.full)) log.completed.evening.full = [];
      if (!Array.isArray(log.completed.evening.light)) log.completed.evening.light = [];
      if (!Array.isArray(log.completed.gym.v1)) log.completed.gym.v1 = [];
      if (!Array.isArray(log.completed.gym.v2)) log.completed.gym.v2 = [];

      return log;
    };

    const ensureTodayLog = () => ensureLog(todayKey());

    let currentPage = "home";
    let currentSection = null; // 'evening'|'gym'
    let currentVariant = null; // evening: full|light; gym: v1|v2
    let calCursor = new Date();
    calCursor.setDate(1);

    const pages = {
      home: $("homePage"),
      workout: $("workoutPage"),
      calendar: $("calendarPage")
    };

    const getCurrentList = () => {
      if (currentSection === "evening") return state.evening[currentVariant] || [];
      if (currentSection === "gym") return state.gym[currentVariant] || [];
      return [];
    };

    const setCurrentList = (arr) => {
      if (currentSection === "evening") state.evening[currentVariant] = arr;
      if (currentSection === "gym") state.gym[currentVariant] = arr;
    };

    const getTodayCompletedIds = () => {
      const log = ensureTodayLog();
      if (currentSection === "evening") return log.completed.evening[currentVariant] || [];
      if (currentSection === "gym") return log.completed.gym[currentVariant] || [];
      return [];
    };

    const setTodayCompletedIds = (ids) => {
      const log = ensureTodayLog();
      if (currentSection === "evening") log.completed.evening[currentVariant] = ids;
      if (currentSection === "gym") log.completed.gym[currentVariant] = ids;
    };

    const updateTodayPrimaryBadge = () => {
      const log = ensureTodayLog();
      const list = getCurrentList();
      const done = getTodayCompletedIds();
      const eligible = list.length > 0 && done.length > 0;

      if (currentSection === "evening") {
        if (eligible) log.evening = currentVariant;
        else if (log.evening === currentVariant) log.evening = null;
      }

      if (currentSection === "gym") {
        if (eligible) log.gym = currentVariant;
        else if (log.gym === currentVariant) log.gym = null;
      }

      saveState();
    };

    const currentVariantLabel = () => {
      if (currentSection === "evening") return currentVariant === "full" ? "Full" : "Light";
      if (currentSection === "gym") return currentVariant === "v1" ? "Variante 1" : "Variante 2";
      return "";
    };

    const currentVariantColor = () => {
      if (currentSection === "evening") return currentVariant === "full" ? "rgba(214,194,137,0.92)" : "rgba(62,209,196,0.90)";
      if (currentSection === "gym") return currentVariant === "v1" ? "rgba(181,140,255,0.92)" : "rgba(255,127,176,0.92)";
      return "rgba(214,194,137,0.92)";
    };

    const showHeaderState = () => {
      $("datePill").textContent = niceDate();

      $("calendarBtn").style.display = "none";
      $("statsBtn").style.display = currentPage === "calendar" ? "inline-flex" : "none";
      $("backBtn").style.display = currentPage === "home" ? "none" : "inline-flex";

      const subA = $("subModeA");
      const subB = $("subModeB");

      subA.style.display = "none";
      subB.style.display = "none";

      if (currentPage === "workout" && currentSection === "evening") {
        $("headerTitle").textContent = "Abendroutine";
        subA.style.display = "inline-flex";
        subB.style.display = "inline-flex";
        subA.textContent = "Full";
        subB.textContent = "Light";
        subA.classList.toggle("active", currentVariant === "full");
        subB.classList.toggle("active", currentVariant === "light");
      } else if (currentPage === "workout" && currentSection === "gym") {
        $("headerTitle").textContent = "Fitnesscenter";
        subA.style.display = "inline-flex";
        subB.style.display = "inline-flex";
        subA.textContent = "Variante 1";
        subB.textContent = "Variante 2";
        subA.classList.toggle("active", currentVariant === "v1");
        subB.classList.toggle("active", currentVariant === "v2");
      } else if (currentPage === "calendar") {
        $("headerTitle").textContent = "Fitness";
      } else {
        $("headerTitle").textContent = "Fitness";
        $("calendarBtn").style.display = "inline-flex";
      }
    };

    const go = (page) => {
      currentPage = page;
      for (const k in pages) pages[k].classList.toggle("active", k === page);
      showHeaderState();

      if (page === "workout") renderWorkout();
      if (page === "calendar") renderCalendar();
    };

    const dayStatus = () => {
      const total = getCurrentList().length;
      const done = getTodayCompletedIds().length;
      if (total === 0) return { kind:"none", text:"0/0" };
      if (done === 0) return { kind:"none", text:`${done}/${total}` };
      if (done >= total) return { kind:"ok", text:`${done}/${total}` };
      return { kind:"warn", text:`${done}/${total}` };
    };

    const eveningMeta = (e) => `${e.sets}x • ${e.reps} Wdh.`;
    const gymMeta = (e) => `Gerät ${e.machine} • ${e.sets} Sätze • ${e.reps} Wdh.`;

    const renderWorkout = () => {
      const listEl = $("exerciseList");
      const emptyEl = $("exerciseEmpty");
      const list = getCurrentList();
      const done = new Set(getTodayCompletedIds());

      $("workoutTitle").textContent = currentSection === "evening" ? "Abendroutine" : "Fitnesscenter";
      $("modeText").textContent = currentVariantLabel();
      $("modeText").style.color = currentVariantColor();

      const st = dayStatus();
      $("todayText").textContent = st.text;
      $("todayDot").className = "dot " + st.kind;
      $("progressPill").textContent = `${done.size}/${list.length}`;

      $("gymWeightSection").style.display = currentSection === "gym" ? "block" : "none";
      if (currentSection === "gym") {
        $("startWeightValue").textContent = state.gym.startWeight ? `${state.gym.startWeight} kg` : "—";
        $("startWeightInput").value = state.gym.startWeight || "";
      }

      emptyEl.style.display = list.length ? "none" : "block";

      let html = "";
      for (const e of list) {
        const isDone = done.has(e.id);
        html += `
          <div class="item ${isDone ? "done" : ""}" data-ex-id="${escapeHtml(e.id)}">
            <div class="left">
              <div class="name">${escapeHtml(e.name)}</div>
              <div class="meta">${escapeHtml(currentSection === "evening" ? eveningMeta(e) : gymMeta(e))}</div>
            </div>
            <div class="right">
              <div class="check">✓</div>
              <button class="trash" type="button" data-trash="1" data-id="${escapeHtml(e.id)}">🗑️</button>
            </div>
          </div>
        `;
      }
      listEl.innerHTML = html;
    };

    $("exerciseList").addEventListener("click", (ev) => {
      const trash = ev.target.closest("[data-trash='1']");
      if (trash) {
        ev.stopPropagation();
        if (!confirm("Übung wirklich löschen?")) return;
        const id = trash.dataset.id;
        setCurrentList(getCurrentList().filter(e => e.id !== id));

        for (const log of state.logs) {
          if (currentSection === "evening") {
            log.completed.evening[currentVariant] = (log.completed.evening[currentVariant] || []).filter(x => x !== id);
            if (log.evening === currentVariant) {
              const eligible = state.evening[currentVariant].length > 0 && log.completed.evening[currentVariant].length > 0;
              if (!eligible) log.evening = null;
            }
          } else if (currentSection === "gym") {
            log.completed.gym[currentVariant] = (log.completed.gym[currentVariant] || []).filter(x => x !== id);
            if (log.gym === currentVariant) {
              const eligible = state.gym[currentVariant].length > 0 && log.completed.gym[currentVariant].length > 0;
              if (!eligible) log.gym = null;
            }
          }
        }

        saveState();
        renderWorkout();
        return;
      }

      const row = ev.target.closest("[data-ex-id]");
      if (!row) return;
      const id = row.dataset.exId;
      const set = new Set(getTodayCompletedIds());
      if (set.has(id)) set.delete(id);
      else set.add(id);
      setTodayCompletedIds(Array.from(set));
      updateTodayPrimaryBadge();
      renderWorkout();
    });

    const openEveningWorkout = (variant) => {
      currentSection = "evening";
      currentVariant = variant;
      go("workout");
    };

    const openGymWorkout = (variant) => {
      currentSection = "gym";
      currentVariant = variant;
      go("workout");
    };

    const markBikingToday = () => {
      const log = ensureTodayLog();
      log.bike = true;
      saveState();
      go("calendar");
    };

    $("eveningMenuBtn").addEventListener("click", () => openEveningWorkout("full"));
    $("gymMenuBtn").addEventListener("click", () => openGymWorkout("v1"));
    $("bikeBtn").addEventListener("click", markBikingToday);

    $("subModeA").addEventListener("click", () => {
      if (currentSection === "evening") openEveningWorkout("full");
      if (currentSection === "gym") openGymWorkout("v1");
    });

    $("subModeB").addEventListener("click", () => {
      if (currentSection === "evening") openEveningWorkout("light");
      if (currentSection === "gym") openGymWorkout("v2");
    });

    $("backBtn").addEventListener("click", () => go("home"));
    $("calendarBtn").addEventListener("click", () => go("calendar"));

    $("saveWeightBtn").addEventListener("click", () => {
      state.gym.startWeight = $("startWeightInput").value.trim();
      saveState();
      renderWorkout();
    });

    // Abendroutine dialog
    $("addExerciseBtn").addEventListener("click", () => {
      if (currentSection === "evening") {
        $("eveningName").value = "";
        $("eveningSets").value = 1;
        $("eveningReps").value = 10;
        $("eveningDlg").showModal();
      } else if (currentSection === "gym") {
        $("gymName").value = "";
        $("gymMachine").value = "";
        $("gymSets").value = 3;
        $("gymReps").value = 10;
        $("gymDlg").showModal();
      }
    });

    $("eveningCancel").addEventListener("click", () => $("eveningDlg").close());
    $("eveningSave").addEventListener("click", () => {
      const name = $("eveningName").value.trim();
      if (!name) return alert("Bitte Name eingeben.");

      const sets = Number($("eveningSets").value) || 1;
      const reps = Number($("eveningReps").value) || 1;

      state.evening[currentVariant].push({
        id: crypto.randomUUID(),
        name,
        sets,
        reps
      });

      saveState();
      renderWorkout();
      $("eveningDlg").close();
    });

    // Gym dialog
    $("gymCancel").addEventListener("click", () => $("gymDlg").close());
    $("gymSave").addEventListener("click", () => {
      const name = $("gymName").value.trim();
      if (!name) return alert("Bitte Name eingeben.");

      const machine = $("gymMachine").value.trim();
      const sets = Number($("gymSets").value) || 1;
      const reps = Number($("gymReps").value) || 1;

      state.gym[currentVariant].push({
        id: crypto.randomUUID(),
        name,
        machine,
        sets,
        reps
      });

      saveState();
      renderWorkout();
      $("gymDlg").close();
    });

    // Calendar
    const renderCalendar = () => {
      $("calTitle").textContent = monthTitle(calCursor);

      const first = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
      const startDay = (first.getDay() + 6) % 7;
      const totalCells = 42;
      const startDate = new Date(first);
      startDate.setDate(first.getDate() - startDay);

      const grid = $("calGrid");
      grid.innerHTML = "";
      const frag = document.createDocumentFragment();

      for (let i=0; i<totalCells; i++) {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);

        const inMonth = d.getMonth() === calCursor.getMonth();
        const key = ymd(d);
        const log = state.logs.find(l => l.dateKey === key);

        const cell = document.createElement("div");
        cell.className = "dayCell" + (inMonth ? "" : " out");

        const top = document.createElement("div");
        top.className = "dayTop";

        const dn = document.createElement("div");
        dn.className = "dayNum";
        dn.textContent = String(d.getDate());

        const markers = document.createElement("div");
        markers.className = "markers";

        if (log?.evening === "full") {
          const m = document.createElement("span");
          m.className = "mk evening-full";
          markers.appendChild(m);
        }
        if (log?.evening === "light") {
          const m = document.createElement("span");
          m.className = "mk evening-light";
          markers.appendChild(m);
        }
        if (log?.gym === "v1") {
          const m = document.createElement("span");
          m.className = "mk gym-v1";
          markers.appendChild(m);
        }
        if (log?.gym === "v2") {
          const m = document.createElement("span");
          m.className = "mk gym-v2";
          markers.appendChild(m);
        }
        if (log?.bike) {
          const m = document.createElement("span");
          m.className = "mk bike";
          markers.appendChild(m);
        }

        top.appendChild(dn);
        top.appendChild(markers);
        cell.appendChild(top);

        if (inMonth) cell.addEventListener("click", () => openDayDialog(key, d));
        frag.appendChild(cell);
      }

      grid.appendChild(frag);
    };

    $("prevMonth").addEventListener("click", () => {
      calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() - 1, 1);
      renderCalendar();
    });

    $("nextMonth").addEventListener("click", () => {
      calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + 1, 1);
      renderCalendar();
    });

    // Day dialog
    let dayDlgKey = null;
    let dayDlgDateObj = null;

    const openDayDialog = (dateKey, dateObj) => {
      dayDlgKey = dateKey;
      dayDlgDateObj = dateObj;
      const log = ensureLog(dateKey);

      $("dayDlgTitle").textContent = fmtDay(dateObj);

      const items = [];
      if (log.evening === "full") items.push({ type:"evening", value:"full", label:"Abendroutine Full" });
      if (log.evening === "light") items.push({ type:"evening", value:"light", label:"Abendroutine Light" });
      if (log.gym === "v1") items.push({ type:"gym", value:"v1", label:"Fitnesscenter Variante 1" });
      if (log.gym === "v2") items.push({ type:"gym", value:"v2", label:"Fitnesscenter Variante 2" });
      if (log.bike) items.push({ type:"bike", value:"true", label:"Biking" });

      const list = $("dayDlgList");
      if (!items.length) {
        list.innerHTML = `<div class="empty">Keine Einträge.</div>`;
      } else {
        list.innerHTML = items.map(it => `
          <div class="item" data-del="${it.type}" data-val="${it.value}">
            <div class="left"><div class="name">${escapeHtml(it.label)}</div></div>
            <div class="right"><button class="trash" type="button">🗑️</button></div>
          </div>
        `).join("");
      }

      $("dayDlg").showModal();
    };

    $("dayDlgClose").addEventListener("click", () => $("dayDlg").close());

    $("dayDlgList").addEventListener("click", (ev) => {
      const btn = ev.target.closest("button.trash");
      if (!btn) return;
      const row = ev.target.closest("[data-del]");
      if (!row) return;

      if (!confirm("Wirklich löschen?")) return;

      const log = ensureLog(dayDlgKey);
      const type = row.dataset.del;
      const val = row.dataset.val;

      if (type === "bike") log.bike = false;
      if (type === "evening" && log.evening === val) log.evening = null;
      if (type === "gym" && log.gym === val) log.gym = null;

      saveState();
      renderCalendar();
      openDayDialog(dayDlgKey, dayDlgDateObj);
    });

    // Stats
    const parseYearMonth = (dateKey) => dateKey.slice(0,7);
    const parseYear = (dateKey) => dateKey.slice(0,4);
    const daysInMonth = (year, monthIndex0) => new Date(year, monthIndex0 + 1, 0).getDate();
    const pct = (n, denom) => denom === 0 ? "0%" : `${Math.round((n / denom) * 100)}%`;

    const isSameMonth = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
    const isBeforeMonth = (a, b) =>
      (a.getFullYear() < b.getFullYear()) || (a.getFullYear() === b.getFullYear() && a.getMonth() < b.getMonth());

    const dayOfYear = (d) => {
      const start = new Date(d.getFullYear(), 0, 1);
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.floor((d - start) / oneDay) + 1;
    };

    const computeMonthStats = () => {
      const today = new Date();
      const year = calCursor.getFullYear();
      const month0 = calCursor.getMonth();
      const ym = `${year}-${String(month0 + 1).padStart(2,"0")}`;
      const fullDim = daysInMonth(year, month0);

      let denomDays;
      if (isSameMonth(calCursor, today)) denomDays = today.getDate();
      else if (isBeforeMonth(calCursor, today)) denomDays = fullDim;
      else denomDays = 0;

      const monthLogs = state.logs.filter(l => parseYearMonth(l.dateKey) === ym);

      const monthActive = monthLogs.filter(l => (l.evening || l.gym || l.bike)).length;
      const eveningFull = monthLogs.filter(l => l.evening === "full").length;
      const eveningLight = monthLogs.filter(l => l.evening === "light").length;
      const gymV1 = monthLogs.filter(l => l.gym === "v1").length;
      const gymV2 = monthLogs.filter(l => l.gym === "v2").length;
      const bike = monthLogs.filter(l => !!l.bike).length;

      return { label: monthTitle(calCursor), denomDays, monthActive, eveningFull, eveningLight, gymV1, gymV2, bike };
    };

    const computeYearStats = () => {
      const today = new Date();
      const currentYear = today.getFullYear();
      const denomDays = dayOfYear(today);
      const yearLogs = state.logs.filter(l => parseYear(l.dateKey) === String(currentYear));

      const yearActive = yearLogs.filter(l => (l.evening || l.gym || l.bike)).length;
      const eveningFull = yearLogs.filter(l => l.evening === "full").length;
      const eveningLight = yearLogs.filter(l => l.evening === "light").length;
      const gymV1 = yearLogs.filter(l => l.gym === "v1").length;
      const gymV2 = yearLogs.filter(l => l.gym === "v2").length;
      const bike = yearLogs.filter(l => !!l.bike).length;

      return { currentYear, denomDays, yearActive, eveningFull, eveningLight, gymV1, gymV2, bike };
    };

    const renderStatsGrid = (gridEl, rows) => {
      let html = "";
      for (const [k,v] of rows) {
        html += `<div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(v)}</div>`;
      }
      gridEl.innerHTML = html;
    };

    const openStats = () => {
      const m = computeMonthStats();
      const y = computeYearStats();

      $("statsSub").textContent = m.label;
      $("statsYearTitle").textContent = `Jahresstatistik für das laufende Jahr (${y.currentYear})`;

      renderStatsGrid($("statsGridMonth"), [
        ["Tage", String(m.denomDays)],
        ["Aktive Tage", `${m.monthActive} (${pct(m.monthActive, m.denomDays)})`],
        ["Abendroutine Full", `${m.eveningFull} (${pct(m.eveningFull, m.denomDays)})`],
        ["Abendroutine Light", `${m.eveningLight} (${pct(m.eveningLight, m.denomDays)})`],
        ["Fitnesscenter Variante 1", `${m.gymV1} (${pct(m.gymV1, m.denomDays)})`],
        ["Fitnesscenter Variante 2", `${m.gymV2} (${pct(m.gymV2, m.denomDays)})`],
        ["Biking", `${m.bike} (${pct(m.bike, m.denomDays)})`],
      ]);

      renderStatsGrid($("statsGridYear"), [
        ["Tage", String(y.denomDays)],
        ["Aktive Tage", `${y.yearActive} (${pct(y.yearActive, y.denomDays)})`],
        ["Abendroutine Full", `${y.eveningFull} (${pct(y.eveningFull, y.denomDays)})`],
        ["Abendroutine Light", `${y.eveningLight} (${pct(y.eveningLight, y.denomDays)})`],
        ["Fitnesscenter Variante 1", `${y.gymV1} (${pct(y.gymV1, y.denomDays)})`],
        ["Fitnesscenter Variante 2", `${y.gymV2} (${pct(y.gymV2, y.denomDays)})`],
        ["Biking", `${y.bike} (${pct(y.bike, y.denomDays)})`],
      ]);

      $("statsDlg").showModal();
    };

    $("statsBtn").addEventListener("click", openStats);
    $("closeStats").addEventListener("click", () => $("statsDlg").close());

    // init
    $("datePill").textContent = niceDate();
    ensureTodayLog();
    saveState();
    go("home");

    setInterval(() => {
      $("datePill").textContent = niceDate();
    }, 60000);
  </script>
</body>
</html>
