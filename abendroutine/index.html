<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fitness-Tracker</title>
  <meta name="theme-color" content="#111827" />
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --green: #16a34a;
      --green-dark: #15803d;
      --red: #dc2626;
      --red-dark: #b91c1c;
      --gray: #9ca3af;
      --blue: #2563eb;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-top: 6px;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .icon-row {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: var(--card);
      width: 38px;
      height: 38px;
      border-radius: 12px;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      cursor: pointer;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(229,231,235,0.9);
    }

    .main-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .main-btn {
      border: 0;
      color: white;
      border-radius: 16px;
      padding: 18px 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 76px;
    }

    .green { background: var(--green); }
    .green:active { background: var(--green-dark); }
    .red { background: var(--red); }
    .red:active { background: var(--red-dark); }

    .today {
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .today strong { color: var(--text); }

    .section-title {
      font-size: 1rem;
      margin: 0 0 10px;
      font-weight: 750;
    }

    .series-line {
      font-size: 0.95rem;
      margin: 6px 0;
      color: var(--text);
    }

    .series-line span {
      font-weight: 800;
    }

    .ten-days-label {
      margin-top: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .ten-days {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .day-box {
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: white;
      font-weight: 800;
    }

    .day-training { background: var(--green); }
    .day-none { background: var(--red); }
    .day-open { background: var(--gray); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.15rem;
      font-weight: 800;
    }

    details summary {
      cursor: pointer;
      font-weight: 750;
      list-style: none;
    }

    details summary::-webkit-details-marker { display: none; }

    .history-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      background: #fafafa;
    }

    .history-date {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .history-status {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 2px;
      line-height: 1.35;
    }

    .small-btn {
      border: 1px solid var(--border);
      background: white;
      border-radius: 11px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
    }

    .unit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .unit-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: #fafafa;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .unit-title {
      font-weight: 750;
      font-size: 0.95rem;
    }

    .unit-meta {
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 8px 0 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }

    .modal label {
      display: block;
      font-size: 0.86rem;
      color: var(--muted);
      margin: 10px 0 5px;
      font-weight: 650;
    }

    .modal input, .modal textarea, .modal select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fafafa;
    }

    .modal textarea { min-height: 72px; resize: vertical; }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .modal-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 8px;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary { background: #e5e7eb; color: var(--text); }
    .danger { background: var(--red); color: white; }
    .primary { background: var(--blue); color: white; }

    input[type="file"] { display: none; }

    @media (max-width: 360px) {
      .main-buttons { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Fitness-Tracker</h1>
      <div class="icon-row">
        <button class="icon-btn" title="Import" onclick="document.getElementById('fileInput').click()">⤴</button>
        <button class="icon-btn" title="Export" onclick="exportCsv()">⤵</button>
        <button class="icon-btn" title="Daten löschen" onclick="clearAllData()">🗑</button>
      </div>
    </header>

    <input id="fileInput" type="file" accept=".csv,text/csv" onchange="importCsv(event)" />

    <section class="card">
      <div class="main-buttons">
        <button class="main-btn green" onclick="openTrainingModal(todayKey())">Training</button>
        <button class="main-btn red" onclick="setEntry(todayKey(), 'none')">Kein Training</button>
      </div>
      <div class="today" id="todayInfo"></div>
    </section>

    <section class="card" id="seriesCard" style="display:none;">
      <div class="series-line">Aktuelle Serie: <span id="currentSeries">0</span></div>
      <div class="series-line">Längste Serie: <span id="longestTrainingSeries">0</span></div>
      <div class="series-line">Längste negativ Serie: <span id="longestNegativeSeries">0</span></div>
      <div class="ten-days-label">Letzte 10 Tage:</div>
      <div class="ten-days" id="tenDays"></div>
    </section>

    <section class="card" id="unitsCard" style="display:none;">
      <p class="section-title">Trainingseinheiten</p>
      <div id="unitList" class="unit-list"></div>
    </section>

    <section class="card" id="statsContainer"></section>

    <section class="card" id="historyCard" style="display:none;">
      <details>
        <summary>Letzte 21 Tage bearbeiten</summary>
        <div class="history-list" id="historyList"></div>
      </details>
    </section>
  </div>

  <div class="modal-backdrop" id="trainingModal">
    <div class="modal">
      <h2 id="modalTitle">Training erfassen</h2>
      <input type="hidden" id="modalDate" />

      <label for="trainingType">Trainingseinheit</label>
      <select id="trainingType">
        <option value="Full Routine">Full Routine</option>
        <option value="Light Routine">Light Routine</option>
        <option value="Peloton">Peloton</option>
        <option value="Spaziergang">Spaziergang</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>

      <label for="trainingNote">Notiz / Details optional</label>
      <textarea id="trainingNote" placeholder="z. B. 90 Swings, 23 Liegestütze, 60 Sek. Plank"></textarea>

      <div class="modal-actions three">
        <button class="modal-btn secondary" onclick="closeTrainingModal()">Abbrechen</button>
        <button class="modal-btn danger" onclick="setModalNone()">Kein Training</button>
        <button class="modal-btn primary" onclick="saveTrainingFromModal()">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'fitnessTrackerV2';
    const START_DATE = '2026-06-23';

    let data = loadData();

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch (e) {
        return {};
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function todayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function parseLocalDate(key) {
      const [y, m, d] = key.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(key) {
      if (!key) return '-';
      const [y, m, d] = key.split('-');
      return `${d}.${m}.${String(y).slice(2)}`;
    }

    function formatLongDate(key) {
      if (!key) return '-';
      const [y, m, d] = key.split('-');
      return `${d}.${m}.${y}`;
    }

    function addDays(key, days) {
      const d = parseLocalDate(key);
      d.setDate(d.getDate() + days);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function statusLabel(entry) {
      if (!entry || entry.status === 'open') return 'Offen';
      if (entry.status === 'training') return 'Training';
      if (entry.status === 'none') return 'Kein Training';
      return 'Offen';
    }

    function getEntry(key) {
      return data[key] || { status: 'open', type: '', note: '' };
    }

    function setEntry(key, status, type = '', note = '') {
      if (key < START_DATE) {
        alert('Die Statistik beginnt am 23.06.2026. Frühere Tage werden nicht erfasst.');
        return;
      }
      if (status === 'open') {
        delete data[key];
      } else {
        data[key] = { status, type, note };
      }
      saveData();
    }

    function openTrainingModal(key) {
      if (key < START_DATE) {
        alert('Die Statistik beginnt am 23.06.2026. Frühere Tage werden nicht erfasst.');
        return;
      }
      const entry = getEntry(key);
      document.getElementById('modalDate').value = key;
      document.getElementById('modalTitle').textContent = `Training erfassen – ${formatLongDate(key)}`;
      document.getElementById('trainingType').value = entry.type || 'Full Routine';
      document.getElementById('trainingNote').value = entry.note || '';
      document.getElementById('trainingModal').style.display = 'flex';
    }

    function closeTrainingModal() {
      document.getElementById('trainingModal').style.display = 'none';
    }

    function saveTrainingFromModal() {
      const key = document.getElementById('modalDate').value;
      const type = document.getElementById('trainingType').value;
      const note = document.getElementById('trainingNote').value.trim();
      setEntry(key, 'training', type, note);
      closeTrainingModal();
    }

    function setModalNone() {
      const key = document.getElementById('modalDate').value;
      setEntry(key, 'none');
      closeTrainingModal();
    }

    function clearAllData() {
      if (confirm('Wirklich alle Fitness-Tracker-Daten löschen?')) {
        data = {};
        saveData();
      }
    }

    function getDateRangeKeys(start, end) {
      const keys = [];
      let cur = start;
      while (cur <= end) {
        keys.push(cur);
        cur = addDays(cur, 1);
      }
      return keys;
    }

    function hasAnyData() {
      return Object.keys(data).some(k => k >= START_DATE && data[k] && data[k].status !== 'open');
    }

    function calculateStreak(targetStatus) {
      const today = todayKey();
      let cur = today;
      let count = 0;
      let start = null;
      while (cur >= START_DATE) {
        const entry = data[cur];
        if (entry && entry.status === targetStatus) {
          count++;
          start = cur;
          cur = addDays(cur, -1);
        } else {
          break;
        }
      }
      return { count, start, end: count ? today : null };
    }

    function calculateLongest(targetStatus) {
      const keys = getDateRangeKeys(START_DATE, todayKey());
      let best = { count: 0, start: null, end: null };
      let current = { count: 0, start: null, end: null };

      keys.forEach(key => {
        const entry = data[key];
        if (entry && entry.status === targetStatus) {
          if (current.count === 0) current.start = key;
          current.count++;
          current.end = key;
          if (current.count > best.count) best = { ...current };
        } else {
          current = { count: 0, start: null, end: null };
        }
      });

      return best;
    }

    function calculateStatsForRange(start, end) {
      const keys = Object.keys(data).filter(k => k >= start && k <= end);
      const entries = keys.map(k => data[k]).filter(e => e && e.status !== 'open');
      const training = entries.filter(e => e.status === 'training').length;
      const none = entries.filter(e => e.status === 'none').length;
      const total = entries.length;
      const quote = total ? Math.round((training / total) * 100) : 0;
      return { total, training, none, quote };
    }

    function renderToday() {
      const today = todayKey();
      const entry = getEntry(today);
      let detail = '';
      if (entry.status === 'training' && entry.type) {
        detail = `<br><strong>${escapeHtml(entry.type)}</strong>${entry.note ? ' – ' + escapeHtml(entry.note) : ''}`;
      }
      document.getElementById('todayInfo').innerHTML = `${formatLongDate(today)}<br>Status: <strong>${statusLabel(entry)}</strong>${detail}`;
    }

    function renderSeries() {
      const card = document.getElementById('seriesCard');
      if (!hasAnyData()) {
        card.style.display = 'none';
        return;
      }
      card.style.display = 'block';

      const current = calculateStreak('training');
      const longestTraining = calculateLongest('training');
      const longestNegative = calculateLongest('none');

      document.getElementById('currentSeries').textContent = current.count ? `${current.count} Tage (seit ${formatDate(current.start)})` : '0 Tage';
      document.getElementById('longestTrainingSeries').textContent = longestTraining.count ? `${longestTraining.count} Tage (${formatDate(longestTraining.start)} - ${formatDate(longestTraining.end)})` : '0 Tage';
      document.getElementById('longestNegativeSeries').textContent = longestNegative.count ? `${longestNegative.count} Tage (${formatDate(longestNegative.start)} - ${formatDate(longestNegative.end)})` : '0 Tage';

      const tenDays = document.getElementById('tenDays');
      tenDays.innerHTML = '';
      for (let i = 9; i >= 0; i--) {
        const key = addDays(todayKey(), -i);
        const entry = getEntry(key);
        const div = document.createElement('div');
        div.className = 'day-box ' + (entry.status === 'training' ? 'day-training' : entry.status === 'none' ? 'day-none' : 'day-open');
        div.textContent = entry.status === 'training' ? '✓' : entry.status === 'none' ? '×' : '?';
        tenDays.appendChild(div);
      }
    }

    function renderUnits() {
      const card = document.getElementById('unitsCard');
      const list = document.getElementById('unitList');
      const entries = Object.keys(data)
        .filter(k => k >= START_DATE && data[k] && data[k].status === 'training')
        .sort((a,b) => b.localeCompare(a))
        .slice(0, 10);

      if (!entries.length) {
        card.style.display = 'none';
        return;
      }

      card.style.display = 'block';
      list.innerHTML = '';
      entries.forEach(key => {
        const entry = data[key];
        const row = document.createElement('div');
        row.className = 'unit-row';
        row.innerHTML = `
          <div>
            <div class="unit-title">${formatLongDate(key)} · ${escapeHtml(entry.type || 'Training')}</div>
            <div class="unit-meta">${entry.note ? escapeHtml(entry.note) : 'Keine Details hinterlegt'}</div>
          </div>
          <button class="small-btn" onclick="openTrainingModal('${key}')">Bearbeiten</button>
        `;
        list.appendChild(row);
      });
    }

    function renderStats() {
      const container = document.getElementById('statsContainer');
      const currentYear = new Date().getFullYear();
      let html = '';

      function statsBlock(title, stats) {
        return `
          <p class="section-title">${title}</p>
          <div class="stats-grid">
            <div class="stat-box"><div class="stat-label">Erfasste Tage</div><div class="stat-value">${stats.total}</div></div>
            <div class="stat-box"><div class="stat-label">Training</div><div class="stat-value">${stats.training}</div></div>
            <div class="stat-box"><div class="stat-label">Kein Training</div><div class="stat-value">${stats.none}</div></div>
            <div class="stat-box"><div class="stat-label">Trainingsquote</div><div class="stat-value">${stats.quote}%</div></div>
          </div>
        `;
      }

      const currentStart = `${currentYear}-01-01` < START_DATE ? START_DATE : `${currentYear}-01-01`;
      html += statsBlock(`Statistik ${currentYear}`, calculateStatsForRange(currentStart, `${currentYear}-12-31`));

      html += '<div style="height:12px"></div>';
      html += statsBlock('Gesamtstatistik', calculateStatsForRange(START_DATE, '9999-12-31'));

      const years = [...new Set(Object.keys(data).map(k => k.slice(0,4)).filter(y => Number(y) < currentYear && Number(y) >= 2026))].sort((a,b) => b.localeCompare(a));
      years.forEach(year => {
        html += '<div style="height:12px"></div>';
        html += statsBlock(`Statistik ${year}`, calculateStatsForRange(`${year}-01-01` < START_DATE ? START_DATE : `${year}-01-01`, `${year}-12-31`));
      });

      container.innerHTML = html;
    }

    function renderHistory() {
      const card = document.getElementById('historyCard');
      if (!hasAnyData()) {
        card.style.display = 'none';
        return;
      }
      card.style.display = 'block';
      const list = document.getElementById('historyList');
      list.innerHTML = '';

      for (let i = 0; i < 21; i++) {
        const key = addDays(todayKey(), -i);
        if (key < START_DATE) continue;
        const entry = getEntry(key);
        const row = document.createElement('div');
        row.className = 'history-row';
        let detail = statusLabel(entry);
        if (entry.status === 'training' && entry.type) detail += ` · ${entry.type}`;
        if (entry.status === 'training' && entry.note) detail += ` · ${entry.note}`;
        row.innerHTML = `
          <div>
            <div class="history-date">${formatLongDate(key)}</div>
            <div class="history-status">${escapeHtml(detail)}</div>
          </div>
          <button class="small-btn" onclick="editHistory('${key}')">Ändern</button>
        `;
        list.appendChild(row);
      }
    }

    function editHistory(key) {
      const choice = prompt('Status wählen:\n1 = Training\n2 = Kein Training\n3 = Offen', '1');
      if (choice === null) return;
      if (choice === '1') openTrainingModal(key);
      else if (choice === '2') setEntry(key, 'none');
      else if (choice === '3') setEntry(key, 'open');
      else alert('Ungültige Eingabe.');
    }

    function exportCsv() {
      const rows = [['date','status','type','note']];
      Object.keys(data).sort().forEach(key => {
        const e = data[key];
        if (!e || e.status === 'open') return;
        rows.push([key, e.status || '', e.type || '', e.note || '']);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"','""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fitness-tracker-${todayKey()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importCsv(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(Boolean);
        const imported = {};
        lines.slice(1).forEach(line => {
          const cols = parseCsvLine(line);
          const [date, status, type, note] = cols;
          if (!date || date < START_DATE) return;
          if (status === 'training' || status === 'none') {
            imported[date] = { status, type: type || '', note: note || '' };
          }
        });
        data = { ...data, ...imported };
        saveData();
        alert('Import abgeschlossen.');
        event.target.value = '';
      };
      reader.readAsText(file, 'UTF-8');
    }

    function parseCsvLine(line) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(cur);
          cur = '';
        } else {
          cur += char;
        }
      }
      result.push(cur);
      return result;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render() {
      renderToday();
      renderSeries();
      renderUnits();
      renderStats();
      renderHistory();
    }

    render();
  </script>
</body>
