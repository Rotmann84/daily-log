<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fitness-Tracker</title>
  <meta name="theme-color" content="#18221d" />
  <style>
    :root {
      --bg: #111814;
      --bg-soft: #17221c;
      --card: #1d2a23;
      --card-2: #24342b;
      --text: #f2f0e8;
      --muted: #aeb8ad;
      --border: rgba(223, 214, 185, 0.16);
      --border-strong: rgba(223, 214, 185, 0.28);
      --green: #4f8f63;
      --green-dark: #3f7952;
      --red: #9b4d4d;
      --red-dark: #813f3f;
      --gray: #6f776f;
      --gold: #c7a96b;
      --gold-dark: #a78c54;
      --blue: #577c8e;
      --shadow: 0 14px 34px rgba(0,0,0,0.26);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #26382d 0, var(--bg) 42%, #0d120f 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-top: 6px;
    }

    h1 {
      font-size: 1.45rem;
      margin: 0;
      letter-spacing: -0.02em;
      color: #f8f2de;
    }

    .icon-row {
      display: flex;
      gap: 7px;
    }

    .icon-btn {
      border: 1px solid var(--border-strong);
      background: rgba(29, 42, 35, 0.88);
      color: var(--text);
      width: 37px;
      height: 37px;
      border-radius: 12px;
      font-size: 1.02rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 14px rgba(0,0,0,0.18);
      cursor: pointer;
    }

    .icon-btn:active { transform: translateY(1px); }

    .card {
      background: rgba(29, 42, 35, 0.94);
      border-radius: var(--radius);
      padding: 15px;
      margin-bottom: 13px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .today-card { padding: 12px; }

    .main-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .main-btn {
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 14px;
      padding: 14px 8px;
      font-size: 1.02rem;
      font-weight: 780;
      cursor: pointer;
      min-height: 58px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 7px 16px rgba(0,0,0,0.18);
    }

    .green { background: linear-gradient(180deg, var(--green), var(--green-dark)); }
    .red { background: linear-gradient(180deg, var(--red), var(--red-dark)); }

    .today {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .today strong { color: var(--text); }
    .today-status { text-align: right; }

    .section-title {
      font-size: 1rem;
      margin: 0 0 10px;
      font-weight: 760;
      color: #f7efd6;
    }

    .series-line {
      font-size: 0.86rem;
      margin: 5px 0;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      white-space: nowrap;
    }

    .series-line span {
      font-weight: 780;
      color: var(--text);
      font-size: 0.83rem;
      text-align: right;
    }

    .ten-days-label {
      margin-top: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .ten-days {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .day-box {
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      color: white;
      font-weight: 820;
    }

    .day-training { background: var(--green); }
    .day-none { background: var(--red); }
    .day-open { background: var(--gray); }

    details summary {
      cursor: pointer;
      font-weight: 760;
      list-style: none;
      color: #f7efd6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    details summary::after {
      content: "▾";
      color: var(--gold);
      font-size: 0.9rem;
      transition: transform 0.15s ease;
    }

    details[open] summary::after { transform: rotate(180deg); }
    details summary::-webkit-details-marker { display: none; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .stat-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
      background: rgba(36, 52, 43, 0.85);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 820;
      color: var(--text);
    }

    .history-list, .unit-list, .settings-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-row, .unit-row, .exercise-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      background: rgba(36, 52, 43, 0.78);
    }

    .history-date, .unit-title, .exercise-name {
      font-weight: 760;
      font-size: 0.94rem;
      color: var(--text);
    }

    .history-status, .unit-meta, .empty-note {
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 3px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .small-btn {
      border: 1px solid var(--border-strong);
      background: rgba(17, 24, 20, 0.72);
      border-radius: 11px;
      padding: 8px 10px;
      font-weight: 760;
      cursor: pointer;
      color: var(--text);
    }

    .small-btn.danger-text { color: #f1b7b7; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.58);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: #1d2a23;
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 18px 46px rgba(0,0,0,0.46);
      max-height: 92vh;
      overflow: auto;
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 1.08rem;
      color: #f7efd6;
    }

    .modal label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin: 10px 0 5px;
      font-weight: 670;
    }

    .modal input, .modal textarea, .modal select {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #121b16;
      color: var(--text);
    }

    .modal textarea { min-height: 86px; resize: vertical; }

    .exercise-add-row {
      display: grid;
      grid-template-columns: 1fr 0.55fr auto;
      gap: 8px;
      align-items: end;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions.three { grid-template-columns: 1fr 1fr 1fr; }

    .modal-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 8px;
      font-weight: 820;
      cursor: pointer;
    }

    .secondary { background: #36443b; color: var(--text); }
    .danger { background: var(--red); color: white; }
    .primary { background: var(--gold); color: #1a1409; }
    .blue { background: var(--blue); color: white; }

    input[type="file"] { display: none; }

    @media (max-width: 380px) {
      .series-line { font-size: 0.8rem; }
      .series-line span { font-size: 0.76rem; }
      .exercise-add-row { grid-template-columns: 1fr; }
      .modal-actions.three { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Fitness-Tracker</h1>
      <div class="icon-row">
        <button class="icon-btn" title="Einstellungen" onclick="openSettingsModal()">⚙</button>
        <button class="icon-btn" title="Import" onclick="document.getElementById('fileInput').click()">⤴</button>
        <button class="icon-btn" title="Export" onclick="exportCsv()">⤵</button>
        <button class="icon-btn" title="Daten löschen" onclick="clearAllData()">🗑</button>
      </div>
    </header>

    <input id="fileInput" type="file" accept=".csv,text/csv" onchange="importCsv(event)" />

    <section class="card today-card">
      <div class="main-buttons">
        <button class="main-btn green" onclick="openTrainingModal(todayKey())">Training</button>
        <button class="main-btn red" onclick="setEntry(todayKey(), 'none')">Kein Training</button>
      </div>
      <div class="today" id="todayInfo"></div>
    </section>

    <section class="card" id="seriesCard" style="display:none;">
      <div class="series-line"><div>Aktuelle Serie:</div><span id="currentSeries">0</span></div>
      <div class="series-line"><div>Längste Serie:</div><span id="longestTrainingSeries">0</span></div>
      <div class="series-line"><div>Längste negativ Serie:</div><span id="longestNegativeSeries">0</span></div>
      <div class="ten-days-label">Letzte 10 Tage:</div>
      <div class="ten-days" id="tenDays"></div>
    </section>

    <section class="card" id="unitsCard" style="display:none;">
      <p class="section-title">Trainingseinheiten</p>
      <div id="unitList" class="unit-list"></div>
    </section>

    <section class="card" id="statsContainer"></section>

    <section class="card" id="historyCard">
      <details>
        <summary>Letzte 21 Tage bearbeiten</summary>
        <div class="history-list" id="historyList"></div>
      </details>
    </section>
  </div>

  <div class="modal-backdrop" id="trainingModal">
    <div class="modal">
      <h2 id="trainingModalTitle">Training erfassen</h2>
      <input type="hidden" id="trainingDate" />

      <div class="exercise-add-row">
        <div>
          <label for="exerciseSelect">Übung</label>
          <select id="exerciseSelect"></select>
        </div>
        <div>
          <label for="exerciseAmount">Anzahl</label>
          <input id="exerciseAmount" type="text" inputmode="text" placeholder="z. B. 90" />
        </div>
        <button class="small-btn" style="height:42px" onclick="addExerciseToNote()">Hinzufügen</button>
      </div>

      <label for="trainingNote">Trainingsinhalt</label>
      <textarea id="trainingNote" placeholder="Hier werden die ausgewählten Übungen fortlaufend gesammelt."></textarea>

      <div class="modal-actions three">
        <button class="modal-btn secondary" onclick="closeTrainingModal()">Abbrechen</button>
        <button class="modal-btn danger" onclick="setTrainingModalNone()">Kein Training</button>
        <button class="modal-btn primary" onclick="saveTrainingFromModal()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="historyModal">
    <div class="modal">
      <h2 id="historyModalTitle">Tag bearbeiten</h2>
      <input type="hidden" id="historyDate" />

      <label for="historyStatus">Status</label>
      <select id="historyStatus" onchange="toggleHistoryTrainingFields()">
        <option value="open">Offen</option>
        <option value="training">Training</option>
        <option value="none">Kein Training</option>
      </select>

      <div id="historyTrainingFields" style="display:none;">
        <label for="historyNote">Trainingsinhalt</label>
        <textarea id="historyNote" placeholder="z. B. 90 Swings\n23 Liegestütze"></textarea>
      </div>

      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeHistoryModal()">Abbrechen</button>
        <button class="modal-btn primary" onclick="saveHistoryModal()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsModal">
    <div class="modal">
      <h2>Übungen verwalten</h2>
      <p class="empty-note">Diese Liste füllt das Dropdown im Menü „Training erfassen“.</p>

      <label for="newExerciseInput">Neue Übung</label>
      <div style="display:grid; grid-template-columns:1fr auto; gap:8px;">
        <input id="newExerciseInput" type="text" placeholder="z. B. Plank" />
        <button class="small-btn" onclick="addExerciseSetting()">Hinzufügen</button>
      </div>

      <div class="settings-list" id="exerciseSettingsList"></div>

      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeSettingsModal()">Schließen</button>
        <button class="modal-btn blue" onclick="resetExercises()">Standardliste</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'fitnessTrackerV2';
    const EXERCISE_KEY = 'fitnessTrackerV2Exercises';
    const START_DATE = '2026-06-23';
    const DEFAULT_EXERCISES = [
      'Kettlebell Swings',
      'Squats',
      'Rows',
      'Liegestütze',
      'Plank',
      'Peloton',
      'Spaziergang',
      'Mobility',
      'Sonstiges'
    ];

    let data = loadData();
    let exercises = loadExercises();

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch (e) { return {}; }
    }

    function loadExercises() {
      try {
        const saved = JSON.parse(localStorage.getItem(EXERCISE_KEY));
        return Array.isArray(saved) && saved.length ? saved : DEFAULT_EXERCISES.slice();
      } catch (e) {
        return DEFAULT_EXERCISES.slice();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function saveExercises() {
      exercises = exercises.map(x => x.trim()).filter(Boolean);
      exercises = [...new Set(exercises)];
      localStorage.setItem(EXERCISE_KEY, JSON.stringify(exercises));
      renderExerciseSelect();
      renderExerciseSettings();
    }

    function todayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function parseLocalDate(key) {
      const [y, m, d] = key.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(key) {
      if (!key) return '-';
      const [y, m, d] = key.split('-');
      return `${d}.${m}.${String(y).slice(2)}`;
    }

    function formatLongDate(key) {
      if (!key) return '-';
      const [y, m, d] = key.split('-');
      return `${d}.${m}.${y}`;
    }

    function addDays(key, days) {
      const d = parseLocalDate(key);
      d.setDate(d.getDate() + days);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function statusLabel(entry) {
      if (!entry || entry.status === 'open') return 'Offen';
      if (entry.status === 'training') return 'Training';
      if (entry.status === 'none') return 'Kein Training';
      return 'Offen';
    }

    function getEntry(key) {
      return data[key] || { status: 'open', note: '' };
    }

    function normalizeEntry(entry) {
      if (!entry) return { status: 'open', note: '' };
      return { status: entry.status || 'open', note: entry.note || '' };
    }

    function setEntry(key, status, note = '') {
      if (key < START_DATE) {
        alert('Die Statistik beginnt am 23.06.2026. Frühere Tage werden nicht erfasst.');
        return;
      }
      if (status === 'open') {
        delete data[key];
      } else {
        data[key] = { status, note: note || '' };
      }
      saveData();
    }

    function openTrainingModal(key) {
      if (key < START_DATE) {
        alert('Die Statistik beginnt am 23.06.2026. Frühere Tage werden nicht erfasst.');
        return;
      }
      const entry = normalizeEntry(getEntry(key));
      document.getElementById('trainingDate').value = key;
      document.getElementById('trainingModalTitle').textContent = `Training erfassen – ${formatLongDate(key)}`;
      document.getElementById('trainingNote').value = entry.status === 'training' ? entry.note : '';
      document.getElementById('exerciseAmount').value = '';
      renderExerciseSelect();
      document.getElementById('trainingModal').style.display = 'flex';
    }

    function closeTrainingModal() {
      document.getElementById('trainingModal').style.display = 'none';
    }

    function addExerciseToNote() {
      const exercise = document.getElementById('exerciseSelect').value;
      const amount = document.getElementById('exerciseAmount').value.trim();
      if (!exercise) {
        alert('Bitte zuerst eine Übung auswählen.');
        return;
      }
      const line = amount ? `${amount} ${exercise}` : exercise;
      const note = document.getElementById('trainingNote');
      note.value = note.value.trim() ? `${note.value.trim()}\n${line}` : line;
      document.getElementById('exerciseAmount').value = '';
      document.getElementById('exerciseAmount').focus();
    }

    function saveTrainingFromModal() {
      const key = document.getElementById('trainingDate').value;
      const note = document.getElementById('trainingNote').value.trim();
      setEntry(key, 'training', note);
      closeTrainingModal();
    }

    function setTrainingModalNone() {
      const key = document.getElementById('trainingDate').value;
      setEntry(key, 'none');
      closeTrainingModal();
    }

    function openHistoryModal(key) {
      const entry = normalizeEntry(getEntry(key));
      document.getElementById('historyDate').value = key;
      document.getElementById('historyModalTitle').textContent = `Tag bearbeiten – ${formatLongDate(key)}`;
      document.getElementById('historyStatus').value = entry.status || 'open';
      document.getElementById('historyNote').value = entry.status === 'training' ? entry.note : '';
      toggleHistoryTrainingFields();
      document.getElementById('historyModal').style.display = 'flex';
    }

    function closeHistoryModal() {
      document.getElementById('historyModal').style.display = 'none';
    }

    function toggleHistoryTrainingFields() {
      const isTraining = document.getElementById('historyStatus').value === 'training';
      document.getElementById('historyTrainingFields').style.display = isTraining ? 'block' : 'none';
    }

    function saveHistoryModal() {
      const key = document.getElementById('historyDate').value;
      const status = document.getElementById('historyStatus').value;
      const note = document.getElementById('historyNote').value.trim();
      setEntry(key, status, status === 'training' ? note : '');
      closeHistoryModal();
    }

    function openSettingsModal() {
      document.getElementById('newExerciseInput').value = '';
      renderExerciseSettings();
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettingsModal() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    function renderExerciseSelect() {
      const select = document.getElementById('exerciseSelect');
      if (!select) return;
      select.innerHTML = '';
      exercises.forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    function renderExerciseSettings() {
      const list = document.getElementById('exerciseSettingsList');
      if (!list) return;
      list.innerHTML = '';
      if (!exercises.length) {
        list.innerHTML = '<p class="empty-note">Noch keine Übungen hinterlegt.</p>';
        return;
      }
      exercises.forEach((name, index) => {
        const row = document.createElement('div');
        row.className = 'exercise-row';
        row.innerHTML = `
          <div class="exercise-name">${escapeHtml(name)}</div>
          <button class="small-btn danger-text" onclick="removeExercise(${index})">Entfernen</button>
        `;
        list.appendChild(row);
      });
    }

    function addExerciseSetting() {
      const input = document.getElementById('newExerciseInput');
      const value = input.value.trim();
      if (!value) return;
      exercises.push(value);
      input.value = '';
      saveExercises();
    }

    function removeExercise(index) {
      if (exercises.length <= 1) {
        alert('Mindestens eine Übung muss vorhanden bleiben.');
        return;
      }
      exercises.splice(index, 1);
      saveExercises();
    }

    function resetExercises() {
      if (confirm('Übungsliste auf Standard zurücksetzen?')) {
        exercises = DEFAULT_EXERCISES.slice();
        saveExercises();
      }
    }

    function clearAllData() {
      if (confirm('Wirklich alle Fitness-Tracker-Daten löschen? Die Übungsliste bleibt erhalten.')) {
        data = {};
        saveData();
      }
    }

    function getDateRangeKeys(start, end) {
      const keys = [];
      let cur = start;
      while (cur <= end) {
        keys.push(cur);
        cur = addDays(cur, 1);
      }
      return keys;
    }

    function hasAnyData() {
      return Object.keys(data).some(k => k >= START_DATE && data[k] && data[k].status !== 'open');
    }

    function calculateStreak(targetStatus) {
      const today = todayKey();
      let cur = today;
      let count = 0;
      let start = null;
      while (cur >= START_DATE) {
        const entry = data[cur];
        if (entry && entry.status === targetStatus) {
          count++;
          start = cur;
          cur = addDays(cur, -1);
        } else {
          break;
        }
      }
      return { count, start, end: count ? today : null };
    }

    function calculateLongest(targetStatus) {
      const keys = getDateRangeKeys(START_DATE, todayKey());
      let best = { count: 0, start: null, end: null };
      let current = { count: 0, start: null, end: null };
      keys.forEach(key => {
        const entry = data[key];
        if (entry && entry.status === targetStatus) {
          if (current.count === 0) current.start = key;
          current.count++;
          current.end = key;
          if (current.count > best.count) best = { ...current };
        } else {
          current = { count: 0, start: null, end: null };
        }
      });
      return best;
    }

    function calculateStatsForRange(start, end) {
      const keys = Object.keys(data).filter(k => k >= start && k <= end);
      const entries = keys.map(k => data[k]).filter(e => e && e.status !== 'open');
      const training = entries.filter(e => e.status === 'training').length;
      const none = entries.filter(e => e.status === 'none').length;
      const total = entries.length;
      const quote = total ? Math.round((training / total) * 100) : 0;
      return { total, training, none, quote };
    }

    function renderToday() {
      const today = todayKey();
      const entry = normalizeEntry(getEntry(today));
      document.getElementById('todayInfo').innerHTML = `
        <div>${formatLongDate(today)}</div>
        <div class="today-status">Status:<br><strong>${statusLabel(entry)}</strong></div>
      `;
    }

    function renderSeries() {
      const card = document.getElementById('seriesCard');
      if (!hasAnyData()) { card.style.display = 'none'; return; }
      card.style.display = 'block';

      const current = calculateStreak('training');
      const longestTraining = calculateLongest('training');
      const longestNegative = calculateLongest('none');
      document.getElementById('currentSeries').textContent = current.count ? `${current.count} Tage (seit ${formatDate(current.start)})` : '0 Tage';
      document.getElementById('longestTrainingSeries').textContent = longestTraining.count ? `${longestTraining.count} Tage (${formatDate(longestTraining.start)}–${formatDate(longestTraining.end)})` : '0 Tage';
      document.getElementById('longestNegativeSeries').textContent = longestNegative.count ? `${longestNegative.count} Tage (${formatDate(longestNegative.start)}–${formatDate(longestNegative.end)})` : '0 Tage';

      const tenDays = document.getElementById('tenDays');
      tenDays.innerHTML = '';
      for (let i = 9; i >= 0; i--) {
        const key = addDays(todayKey(), -i);
        const entry = normalizeEntry(getEntry(key));
        const div = document.createElement('div');
        div.className = 'day-box ' + (entry.status === 'training' ? 'day-training' : entry.status === 'none' ? 'day-none' : 'day-open');
        div.textContent = entry.status === 'training' ? '✓' : entry.status === 'none' ? '×' : '?';
        tenDays.appendChild(div);
      }
    }

    function renderUnits() {
      const card = document.getElementById('unitsCard');
      const list = document.getElementById('unitList');
      const entries = Object.keys(data)
        .filter(k => k >= START_DATE && data[k] && data[k].status === 'training')
        .sort((a,b) => b.localeCompare(a))
        .slice(0, 10);
      if (!entries.length) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      list.innerHTML = '';
      entries.forEach(key => {
        const entry = normalizeEntry(data[key]);
        const row = document.createElement('div');
        row.className = 'unit-row';
        row.innerHTML = `
          <div>
            <div class="unit-title">${formatLongDate(key)}</div>
            <div class="unit-meta">${entry.note ? escapeHtml(entry.note) : 'Keine Übungen hinterlegt'}</div>
          </div>
          <button class="small-btn" onclick="openTrainingModal('${key}')">Bearbeiten</button>
        `;
        list.appendChild(row);
      });
    }

    function renderStats() {
      const container = document.getElementById('statsContainer');
      const currentYear = new Date().getFullYear();
      let html = '<p class="section-title">Statistiken</p>';

      function statsDetails(title, stats, open = false) {
        return `
          <details ${open ? 'open' : ''}>
            <summary>${title}</summary>
            <div class="stats-grid">
              <div class="stat-box"><div class="stat-label">Erfasste Tage</div><div class="stat-value">${stats.total}</div></div>
              <div class="stat-box"><div class="stat-label">Training</div><div class="stat-value">${stats.training}</div></div>
              <div class="stat-box"><div class="stat-label">Kein Training</div><div class="stat-value">${stats.none}</div></div>
              <div class="stat-box"><div class="stat-label">Trainingsquote</div><div class="stat-value">${stats.quote}%</div></div>
            </div>
          </details>
        `;
      }

      const currentStart = `${currentYear}-01-01` < START_DATE ? START_DATE : `${currentYear}-01-01`;
      html += statsDetails(`Statistik ${currentYear}`, calculateStatsForRange(currentStart, `${currentYear}-12-31`), true);
      html += '<div style="height:12px"></div>';
      html += statsDetails('Gesamtstatistik', calculateStatsForRange(START_DATE, '9999-12-31'));

      const years = [...new Set(Object.keys(data).map(k => k.slice(0,4)).filter(y => Number(y) < currentYear && Number(y) >= 2026))].sort((a,b) => b.localeCompare(a));
      years.forEach(year => {
        html += '<div style="height:12px"></div>';
        html += statsDetails(`Statistik ${year}`, calculateStatsForRange(`${year}-01-01` < START_DATE ? START_DATE : `${year}-01-01`, `${year}-12-31`));
      });
      container.innerHTML = html;
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '';
      for (let i = 0; i < 21; i++) {
        const key = addDays(todayKey(), -i);
        if (key < START_DATE) continue;
        const entry = normalizeEntry(getEntry(key));
        const row = document.createElement('div');
        row.className = 'history-row';
        const detail = entry.status === 'training' && entry.note ? `${statusLabel(entry)}\n${entry.note}` : statusLabel(entry);
        row.innerHTML = `
          <div>
            <div class="history-date">${formatLongDate(key)}</div>
            <div class="history-status">${escapeHtml(detail)}</div>
          </div>
          <button class="small-btn" onclick="openHistoryModal('${key}')">Ändern</button>
        `;
        list.appendChild(row);
      }
    }

    function exportCsv() {
      const rows = [['date','status','note']];
      Object.keys(data).sort().forEach(key => {
        const e = normalizeEntry(data[key]);
        if (!e || e.status === 'open') return;
        rows.push([key, e.status || '', e.note || '']);
      });
      const csv = rows.map(row => row.map(cell => `"${String(cell).replaceAll('"','""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fitness-tracker-${todayKey()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importCsv(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(Boolean);
        const header = parseCsvLine(lines[0] || '').map(x => x.toLowerCase());
        const imported = {};
        lines.slice(1).forEach(line => {
          const cols = parseCsvLine(line);
          const date = cols[header.indexOf('date')] || cols[0];
          const status = cols[header.indexOf('status')] || cols[1];
          const noteIndex = header.indexOf('note');
          const oldTypeIndex = header.indexOf('type');
          let note = noteIndex >= 0 ? cols[noteIndex] : (cols[2] || '');
          if (!note && oldTypeIndex >= 0) note = cols[oldTypeIndex] || '';
          if (!date || date < START_DATE) return;
          if (status === 'training' || status === 'none') imported[date] = { status, note: note || '' };
        });
        data = { ...data, ...imported };
        saveData();
        alert('Import abgeschlossen.');
        event.target.value = '';
      };
      reader.readAsText(file, 'UTF-8');
    }

    function parseCsvLine(line) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === ',' && !inQuotes) {
          result.push(cur); cur = '';
        } else { cur += char; }
      }
      result.push(cur);
      return result;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render() {
      renderToday();
      renderSeries();
      renderUnits();
      renderStats();
      renderHistory();
      renderExerciseSelect();
    }

    render();
  </script>
</body>
</html>
