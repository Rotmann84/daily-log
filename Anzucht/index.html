      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;

    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        linear-gradient(180deg, #f8f2f4 0%, #f4ecef 100%);
      color: var(--text);
    }

    body {
      padding:
        calc(env(safe-area-inset-top) + 14px)
        14px
        calc(env(safe-area-inset-bottom) + 18px);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      padding: 4px 2px 0;
    }

    .title {
      font-size: 1.45rem;
      font-weight: 750;
      letter-spacing: 0.01em;
      color: var(--primary-dark);
    }

    .datebox {
      text-align: right;
      font-size: 0.96rem;
      color: var(--muted);
      line-height: 1.25;
      white-space: nowrap;
    }

    .board-wrap {
      background: var(--card);
      border: 1px solid rgba(111, 29, 58, 0.12);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background:
        linear-gradient(180deg, #fffafc 0%, #f7eef2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
      font-size: 0.72rem;
      font-weight: 650;
      color: var(--primary-dark);
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
      overflow: hidden;
    }

    .cell:active {
      transform: scale(0.98);
    }

    .cell.empty {
      color: #b89aa6;
      font-weight: 500;
      font-size: 0.7rem;
    }

    .cell.filled {
      border-color: rgba(111, 29, 58, 0.35);
      box-shadow: inset 0 0 0 1px rgba(111, 29, 58, 0.06);
    }

    .cell-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      line-height: 1.05;
      width: 100%;
    }

    .plant-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .plant-date {
      font-size: 0.63rem;
      font-weight: 500;
      color: var(--muted);
    }

    .legend {
      margin-top: 12px;
      font-size: 0.88rem;
      color: var(--muted);
      padding: 0 2px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(37, 14, 23, 0.42);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 12px calc(env(safe-area-inset-bottom) + 12px);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 22px 60px rgba(39, 10, 21, 0.25);
      overflow: hidden;
      animation: slideUp 0.16s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(111, 29, 58, 0.1);
    }

    .modal-title {
      font-size: 1.08rem;
      font-weight: 750;
      color: var(--primary-dark);
    }

    .close-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      padding: 2px 6px;
      cursor: pointer;
    }

    .modal-body {
      padding: 16px 18px 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 7px;
    }

    .value-box,
    input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 52px;
      padding: 14px 14px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 4px rgba(185, 107, 134, 0.12);
    }

    .value-box {
      display: flex;
      align-items: center;
    }

    .value-empty {
      color: #a5929b;
      font-style: italic;
    }

    .mode-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 11px;
      border-radius: 999px;
      background: #f4e7ec;
      color: var(--primary-dark);
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      min-height: 48px;
      padding: 0 16px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .btn-secondary {
      background: #efe2e7;
      color: var(--primary-dark);
    }

    .btn-danger {
      background: #f7e3e7;
      color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(111, 29, 58, 0.15);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      .board {
        gap: 8px;
      }

      .cell {
        border-radius: 13px;
        font-size: 0.66rem;
        padding: 4px;
      }

      .plant-date {
        font-size: 0.57rem;
      }

      .title {
        font-size: 1.28rem;
      }

      .datebox {
        font-size: 0.88rem;
      }

      .modal-footer {
        justify-content: stretch;
      }

      .modal-footer .btn {
        flex: 1 1 calc(50% - 10px);
      }
    }

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Anzuchtplan</div>
      <div class="datebox" id="currentDate"></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="legend">7 × 4 Felder · Tippen zum Öffnen</div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Feld</div>
        <button class="close-btn" id="closeModalBtn" aria-label="Schließen">×</button>
      </div>

      <div class="modal-body">
        <div class="mode-chip" id="modeChip">Lesemodus</div>

        <div id="readView">
          <div class="field">
            <label class="label">Pflanze</label>
            <div class="value-box" id="readPlant"></div>
          </div>
          <div class="field">
            <label class="label">Einsaatdatum</label>
            <div class="value-box" id="readDate"></div>
          </div>
        </div>

        <div id="editView" class="hidden">
          <div class="field">
            <label class="label" for="plantInput">Pflanze</label>
            <input id="plantInput" type="text" placeholder="z. B. Tomate, Paprika, Chili" />
          </div>
          <div class="field">
            <label class="label" for="sowDateInput">Einsaatdatum</label>
            <input id="sowDateInput" type="date" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelBtn">Schließen</button>
        <button class="btn btn-danger" id="deleteBtn">Trash</button>
        <button class="btn btn-secondary" id="editBtn">Bearbeiten</button>
        <button class="btn btn-primary hidden" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = 7;
    const ROWS = 4;
    const TOTAL_CELLS = COLS * ROWS;
    const STORAGE_KEY = "anzuchtplan_v1";

    const boardEl = document.getElementById("board");
    const currentDateEl = document.getElementById("currentDate");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modeChip = document.getElementById("modeChip");

    const readView = document.getElementById("readView");
    const editView = document.getElementById("editView");

    const readPlant = document.getElementById("readPlant");
    const readDate = document.getElementById("readDate");

    const plantInput = document.getElementById("plantInput");
    const sowDateInput = document.getElementById("sowDateInput");

    const closeModalBtn = document.getElementById("closeModalBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");

    let cells = loadData();
    let activeIndex = null;
    let isEditMode = false;

    function createEmptyCells() {
      return Array.from({ length: TOTAL_CELLS }, () => ({
        plant: "",
        sowDate: ""
      }));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createEmptyCells();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== TOTAL_CELLS) {
          return createEmptyCells();
        }
        return parsed.map(item => ({
          plant: item?.plant || "",
          sowDate: item?.sowDate || ""
        }));
      } catch {
        return createEmptyCells();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
    }

    function formatToday() {
      const now = new Date();
      const formatted = now.toLocaleDateString("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
      currentDateEl.textContent = formatted;
    }

    function formatSowDate(dateStr) {
      if (!dateStr) return "";
      const parts = dateStr.split("-");
      if (parts.length !== 3) return dateStr;
      return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      cells.forEach((cell, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `cell ${cell.plant ? "filled" : "empty"}`;
        btn.setAttribute("aria-label", `Feld ${index + 1}`);
        btn.dataset.index = index;

        if (cell.plant) {
          btn.innerHTML = `
            <div class="cell-content">
              <div class="plant-name">${escapeHtml(cell.plant)}</div>
              <div class="plant-date">${escapeHtml(formatSowDate(cell.sowDate))}</div>
            </div>
          `;
        } else {
          btn.textContent = `Feld ${index + 1}`;
        }

        btn.addEventListener("click", () => openModal(index));
        boardEl.appendChild(btn);
      });
    }

    function setReadValues(index) {
      const entry = cells[index];
      readPlant.innerHTML = entry.plant
        ? escapeHtml(entry.plant)
        : `<span class="value-empty">Kein Eintrag</span>`;

      readDate.innerHTML = entry.sowDate
        ? escapeHtml(formatSowDate(entry.sowDate))
        : `<span class="value-empty">Kein Datum</span>`;
    }

    function setEditValues(index) {
      const entry = cells[index];
      plantInput.value = entry.plant || "";
      sowDateInput.value = entry.sowDate || "";
    }

    function setMode(editMode) {
      isEditMode = editMode;

      if (editMode) {
        modeChip.textContent = "Bearbeiten";
        readView.classList.add("hidden");
        editView.classList.remove("hidden");
        editBtn.classList.add("hidden");
        saveBtn.classList.remove("hidden");
        requestAnimationFrame(() => plantInput.focus());
      } else {
        modeChip.textContent = "Lesemodus";
        readView.classList.remove("hidden");
        editView.classList.add("hidden");
        editBtn.classList.remove("hidden");
        saveBtn.classList.add("hidden");
      }
    }

    function openModal(index) {
      activeIndex = index;
      modalTitle.textContent = `Feld ${index + 1}`;
      setReadValues(index);
      setEditValues(index);
      setMode(false);
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      activeIndex = null;
      setMode(false);
    }

    function saveActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: plantInput.value.trim(),
        sowDate: sowDateInput.value
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setMode(false);
    }

    function deleteActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: "",
        sowDate: ""
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setEditValues(activeIndex);
      setMode(false);
    }

    editBtn.addEventListener("click", () => {
      setMode(true);
    });

    saveBtn.addEventListener("click", () => {
      saveActiveCell();
    });

    deleteBtn.addEventListener("click", () => {
      deleteActiveCell();
    });

    closeModalBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) {
        closeModal();
      }
    });

    formatToday();
    renderBoard();

    // kleiner Versuch für Standalone-Verhalten / mobile Browser
    // Die URL-Leiste verschwindet auf iPhone erst sauber,
    // wenn die Seite zum Home-Bildschirm hinzugefügt wurde.
  </script>
</body>

      border-radius: 14px;
      min-height: 48px;
      padding: 0 16px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .btn-secondary {
      background: #efe2e7;
      color: var(--primary-dark);
    }

    .btn-danger {
      background: #f7e3e7;
      color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(111, 29, 58, 0.15);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      .board {
        gap: 8px;
      }

      .cell {
        border-radius: 13px;
        font-size: 0.66rem;
        padding: 4px;
      }

      .plant-date {
        font-size: 0.57rem;
      }

      .title {
        font-size: 1.28rem;
      }

      .datebox {
        font-size: 0.88rem;
      }

      .modal-footer {
        justify-content: stretch;
      }

      .modal-footer .btn {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Anzuchtplan</div>
      <div class="datebox" id="currentDate"></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="legend">7 × 4 Felder · Tippen zum Öffnen</div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Feld</div>
        <button class="close-btn" id="closeModalBtn" aria-label="Schließen">×</button>
      </div>

      <div class="modal-body">
        <div class="mode-chip" id="modeChip">Lesemodus</div>

        <div id="readView">
          <div class="field">
            <label class="label">Pflanze</label>
            <div class="value-box" id="readPlant"></div>
          </div>
          <div class="field">
            <label class="label">Einsaatdatum</label>
            <div class="value-box" id="readDate"></div>
          </div>
        </div>

        <div id="editView" class="hidden">
          <div class="field">
            <label class="label" for="plantInput">Pflanze</label>
            <input id="plantInput" type="text" placeholder="z. B. Tomate, Paprika, Chili" />
          </div>
          <div class="field">
            <label class="label" for="sowDateInput">Einsaatdatum</label>
            <input id="sowDateInput" type="date" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelBtn">Schließen</button>
        <button class="btn btn-danger" id="deleteBtn">Trash</button>
        <button class="btn btn-secondary" id="editBtn">Bearbeiten</button>
        <button class="btn btn-primary hidden" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = 7;
    const ROWS = 4;
    const TOTAL_CELLS = COLS * ROWS;
    const STORAGE_KEY = "anzuchtplan_v1";

    const boardEl = document.getElementById("board");
    const currentDateEl = document.getElementById("currentDate");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modeChip = document.getElementById("modeChip");

    const readView = document.getElementById("readView");
    const editView = document.getElementById("editView");

    const readPlant = document.getElementById("readPlant");
    const readDate = document.getElementById("readDate");

    const plantInput = document.getElementById("plantInput");
    const sowDateInput = document.getElementById("sowDateInput");

    const closeModalBtn = document.getElementById("closeModalBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");

    let cells = loadData();
    let activeIndex = null;
    let isEditMode = false;

    function createEmptyCells() {
      return Array.from({ length: TOTAL_CELLS }, () => ({
        plant: "",
        sowDate: ""
      }));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createEmptyCells();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== TOTAL_CELLS) {
          return createEmptyCells();
        }
        return parsed.map(item => ({
          plant: item?.plant || "",
          sowDate: item?.sowDate || ""
        }));
      } catch {
        return createEmptyCells();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
    }

    function formatToday() {
      const now = new Date();
      const formatted = now.toLocaleDateString("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
      currentDateEl.textContent = formatted;
    }

    function formatSowDate(dateStr) {
      if (!dateStr) return "";
      const parts = dateStr.split("-");
      if (parts.length !== 3) return dateStr;
      return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      cells.forEach((cell, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `cell ${cell.plant ? "filled" : "empty"}`;
        btn.setAttribute("aria-label", `Feld ${index + 1}`);
        btn.dataset.index = index;

        if (cell.plant) {
          btn.innerHTML = `
            <div class="cell-content">
              <div class="plant-name">${escapeHtml(cell.plant)}</div>
              <div class="plant-date">${escapeHtml(formatSowDate(cell.sowDate))}</div>
            </div>
          `;
        } else {
          btn.textContent = `Feld ${index + 1}`;
        }

        btn.addEventListener("click", () => openModal(index));
        boardEl.appendChild(btn);
      });
    }

    function setReadValues(index) {
      const entry = cells[index];
      readPlant.innerHTML = entry.plant
        ? escapeHtml(entry.plant)
        : `<span class="value-empty">Kein Eintrag</span>`;

      readDate.innerHTML = entry.sowDate
        ? escapeHtml(formatSowDate(entry.sowDate))
        : `<span class="value-empty">Kein Datum</span>`;
    }

    function setEditValues(index) {
      const entry = cells[index];
      plantInput.value = entry.plant || "";
      sowDateInput.value = entry.sowDate || "";
    }

    function setMode(editMode) {
      isEditMode = editMode;

      if (editMode) {
        modeChip.textContent = "Bearbeiten";
        readView.classList.add("hidden");
        editView.classList.remove("hidden");
        editBtn.classList.add("hidden");
        saveBtn.classList.remove("hidden");
        requestAnimationFrame(() => plantInput.focus());
      } else {
        modeChip.textContent = "Lesemodus";
        readView.classList.remove("hidden");
        editView.classList.add("hidden");
        editBtn.classList.remove("hidden");
        saveBtn.classList.add("hidden");
      }
    }

    function openModal(index) {
      activeIndex = index;
      modalTitle.textContent = `Feld ${index + 1}`;
      setReadValues(index);
      setEditValues(index);
      setMode(false);
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      activeIndex = null;
      setMode(false);
    }

    function saveActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: plantInput.value.trim(),
        sowDate: sowDateInput.value
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setMode(false);
    }

    function deleteActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: "",
        sowDate: ""
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setEditValues(activeIndex);
      setMode(false);
    }

    editBtn.addEventListener("click", () => {
      setMode(true);
    });

    saveBtn.addEventListener("click", () => {
      saveActiveCell();
    });

    deleteBtn.addEventListener("click", () => {
      deleteActiveCell();
    });

    closeModalBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalBackdrop.classList.contains("open")) {
        closeModal();
      }
    });

    formatToday();
    renderBoard();

    // kleiner Versuch für Standalone-Verhalten / mobile Browser
    // Die URL-Leiste verschwindet auf iPhone erst sauber,
    // wenn die Seite zum Home-Bildschirm hinzugefügt wurde.
  </script>
</body>
</html>
