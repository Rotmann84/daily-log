<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Anzuchtplan</title>

  <meta name="theme-color" content="#6f1d3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Anzuchtplan" />

  <style>
    :root {
      --bg1: #f8f1f4;
      --bg2: #f2e8ec;
      --card: #fffafc;
      --primary: #6f1d3a;
      --primary-dark: #54152c;
      --primary-soft: #b96b86;
      --line: #dbc3cc;
      --text: #2f1b22;
      --muted: #7f6871;
      --danger: #a1283f;
      --soft: #f3e5ea;
      --shadow: 0 12px 30px rgba(88, 20, 46, 0.12);
      --radius: 22px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    body {
      padding:
        calc(env(safe-area-inset-top) + 14px)
        14px
        calc(env(safe-area-inset-bottom) + 18px);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      padding: 2px 2px 0;
    }

    .title {
      font-size: 1.42rem;
      font-weight: 760;
      letter-spacing: 0.01em;
      color: var(--primary-dark);
    }

    .datebox {
      text-align: right;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.25;
      white-space: nowrap;
    }

    .board-wrap {
      background: var(--card);
      border: 1px solid rgba(111, 29, 58, 0.12);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .cell {
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #fffafc 0%, #f7eef2 100%);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.08s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      padding: 4px;
      overflow: hidden;
    }

    .cell:active {
      transform: scale(0.98);
    }

    .cell.empty {
      color: #bea6af;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .cell.filled {
      border-color: rgba(111, 29, 58, 0.34);
      box-shadow: inset 0 0 0 1px rgba(111, 29, 58, 0.06);
      background: linear-gradient(180deg, #fff8fb 0%, #f4e8ee 100%);
    }

    .cell-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-weight: 800;
      color: var(--primary-dark);
      user-select: none;
    }

    .cell-x {
      font-size: 1.15rem;
      line-height: 1;
    }

    .cell-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .modal-backdrop,
    .picker-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(37, 14, 23, 0.42);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 12px calc(env(safe-area-inset-bottom) + 12px);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.open,
    .picker-backdrop.open {
      display: flex;
    }

    .modal,
    .picker-modal {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 22px 60px rgba(39, 10, 21, 0.25);
      overflow: hidden;
      animation: slideUp 0.16s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header,
    .picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(111, 29, 58, 0.1);
    }

    .modal-title,
    .picker-title {
      font-size: 1.06rem;
      font-weight: 760;
      color: var(--primary-dark);
    }

    .close-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      padding: 2px 6px;
      cursor: pointer;
    }

    .modal-body {
      padding: 16px 18px 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .value-box,
    input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 52px;
      padding: 14px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 4px rgba(185, 107, 134, 0.12);
    }

    .value-box {
      display: flex;
      align-items: center;
    }

    .value-empty {
      color: #a5929b;
      font-style: italic;
    }

    .mode-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 11px;
      border-radius: 999px;
      background: #f4e7ec;
      color: var(--primary-dark);
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .icon-select-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-preview {
      min-width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-size: 1.5rem;
      color: var(--primary-dark);
    }

    .icon-picker-btn {
      flex: 1;
    }

    .modal-footer,
    .picker-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      min-height: 48px;
      padding: 0 16px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #efe2e7;
      color: var(--primary-dark);
    }

    .btn-danger {
      background: #f7e3e7;
      color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(111, 29, 58, 0.15);
    }

    .picker-body {
      padding: 16px 18px 18px;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .icon-option {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      min-height: 84px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      color: var(--text);
      text-align: center;
    }

    .icon-option:active {
      transform: scale(0.98);
    }

    .icon-option.selected {
      border-color: rgba(111, 29, 58, 0.5);
      box-shadow: 0 0 0 4px rgba(111, 29, 58, 0.08);
      background: #fff8fb;
    }

    .icon-symbol {
      font-size: 1.55rem;
      line-height: 1;
    }

    .icon-label {
      font-size: 0.74rem;
      font-weight: 650;
      line-height: 1.1;
      color: var(--primary-dark);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      .board {
        gap: 8px;
      }

      .cell {
        border-radius: 13px;
      }

      .title {
        font-size: 1.25rem;
      }

      .datebox {
        font-size: 0.88rem;
      }

      .cell-icon {
        font-size: 1.3rem;
      }

      .cell-x {
        font-size: 1rem;
      }

      .icon-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .modal-footer .btn,
      .picker-footer .btn {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Anzuchtplan</div>
      <div class="datebox" id="currentDate"></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Feld</div>
        <button class="close-btn" id="closeModalBtn" aria-label="Schließen">×</button>
      </div>

      <div class="modal-body">
        <div class="mode-chip" id="modeChip">Lesemodus</div>

        <div id="readView">
          <div class="field">
            <label class="label">Pflanze</label>
            <div class="value-box" id="readPlant"></div>
          </div>
          <div class="field">
            <label class="label">Einsaatdatum</label>
            <div class="value-box" id="readDate"></div>
          </div>
          <div class="field">
            <label class="label">Icon</label>
            <div class="value-box" id="readIcon"></div>
          </div>
        </div>

        <div id="editView" class="hidden">
          <div class="field">
            <label class="label" for="plantInput">Pflanze</label>
            <input id="plantInput" type="text" placeholder="z. B. Tomate, Paprika, Chili" />
          </div>

          <div class="field">
            <label class="label" for="sowDateInput">Einsaatdatum</label>
            <input id="sowDateInput" type="date" />
          </div>

          <div class="field">
            <label class="label">Gemüseicon</label>
            <div class="icon-select-wrap">
              <div class="icon-preview" id="selectedIconPreview">x</div>
              <button class="btn btn-secondary icon-picker-btn" id="openIconPickerBtn" type="button">
                Icon auswählen
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelBtn">Schließen</button>
        <button class="btn btn-danger" id="deleteBtn">Trash</button>
        <button class="btn btn-secondary" id="editBtn">Bearbeiten</button>
        <button class="btn btn-primary hidden" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>

  <div class="picker-backdrop" id="pickerBackdrop">
    <div class="picker-modal" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="picker-header">
        <div class="picker-title" id="pickerTitle">Gemüseicon wählen</div>
        <button class="close-btn" id="closePickerBtn" aria-label="Schließen">×</button>
      </div>

      <div class="picker-body">
        <div class="icon-grid" id="iconGrid"></div>
      </div>

      <div class="picker-footer">
        <button class="btn btn-ghost" id="cancelPickerBtn">Zurück</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = 7;
    const ROWS = 4;
    const TOTAL_CELLS = COLS * ROWS;
    const STORAGE_KEY = "anzuchtplan_v2";

    const ICONS = [
      { value: "", label: "Kein Icon", symbol: "x" },
      { value: "🍅", label: "Tomate", symbol: "🍅" },
      { value: "🫑", label: "Paprika", symbol: "🫑" },
      { value: "🌶️", label: "Chili", symbol: "🌶️" },
      { value: "🥒", label: "Gurke", symbol: "🥒" },
      { value: "🥬", label: "Salat", symbol: "🥬" },
      { value: "🌽", label: "Mais", symbol: "🌽" },
      { value: "🍆", label: "Aubergine", symbol: "🍆" },
      { value: "🎃", label: "Kürbis", symbol: "🎃" },
      { value: "🌿", label: "Kräuter", symbol: "🌿" },
      { value: "🌱", label: "Keimling", symbol: "🌱" },
      { value: "🧄", label: "Knoblauch", symbol: "🧄" }
    ];

    const boardEl = document.getElementById("board");
    const currentDateEl = document.getElementById("currentDate");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const pickerBackdrop = document.getElementById("pickerBackdrop");

    const modalTitle = document.getElementById("modalTitle");
    const modeChip = document.getElementById("modeChip");

    const readView = document.getElementById("readView");
    const editView = document.getElementById("editView");

    const readPlant = document.getElementById("readPlant");
    const readDate = document.getElementById("readDate");
    const readIcon = document.getElementById("readIcon");

    const plantInput = document.getElementById("plantInput");
    const sowDateInput = document.getElementById("sowDateInput");
    const selectedIconPreview = document.getElementById("selectedIconPreview");

    const closeModalBtn = document.getElementById("closeModalBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");

    const openIconPickerBtn = document.getElementById("openIconPickerBtn");
    const closePickerBtn = document.getElementById("closePickerBtn");
    const cancelPickerBtn = document.getElementById("cancelPickerBtn");
    const iconGrid = document.getElementById("iconGrid");

    let cells = loadData();
    let activeIndex = null;
    let isEditMode = false;
    let tempSelectedIcon = "";

    function createEmptyCells() {
      return Array.from({ length: TOTAL_CELLS }, () => ({
        plant: "",
        sowDate: "",
        icon: ""
      }));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createEmptyCells();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== TOTAL_CELLS) {
          return createEmptyCells();
        }
        return parsed.map(item => ({
          plant: item?.plant || "",
          sowDate: item?.sowDate || "",
          icon: item?.icon || ""
        }));
      } catch {
        return createEmptyCells();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
    }

    function formatToday() {
      const now = new Date();
      currentDateEl.textContent = now.toLocaleDateString("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function formatSowDate(dateStr) {
      if (!dateStr) return "";
      const parts = dateStr.split("-");
      if (parts.length !== 3) return dateStr;
      return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getDisplayMark(entry) {
      if (!entry.plant && !entry.sowDate && !entry.icon) return null;
      return entry.icon || "x";
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      cells.forEach((entry, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cell";
        btn.dataset.index = index;
        btn.setAttribute("aria-label", `Feld ${index + 1}`);

        const mark = getDisplayMark(entry);

        if (mark) {
          btn.classList.add("filled");
          const isX = mark === "x";
          btn.innerHTML = `
            <div class="cell-mark ${isX ? "cell-x" : "cell-icon"}">${escapeHtml(mark)}</div>
          `;
        } else {
          btn.classList.add("empty");
          btn.innerHTML = `<div class="cell-mark">${index + 1}</div>`;
        }

        btn.addEventListener("click", () => openModal(index));
        boardEl.appendChild(btn);
      });
    }

    function setReadValues(index) {
      const entry = cells[index];

      readPlant.innerHTML = entry.plant
        ? escapeHtml(entry.plant)
        : `<span class="value-empty">Kein Eintrag</span>`;

      readDate.innerHTML = entry.sowDate
        ? escapeHtml(formatSowDate(entry.sowDate))
        : `<span class="value-empty">Kein Datum</span>`;

      readIcon.innerHTML = entry.icon
        ? escapeHtml(entry.icon)
        : `<span class="value-empty">Kein Icon gewählt</span>`;
    }

    function setEditValues(index) {
      const entry = cells[index];
      plantInput.value = entry.plant || "";
      sowDateInput.value = entry.sowDate || "";
      tempSelectedIcon = entry.icon || "";
      updateSelectedIconPreview();
    }

    function updateSelectedIconPreview() {
      selectedIconPreview.textContent = tempSelectedIcon || "x";
    }

    function setMode(editMode) {
      isEditMode = editMode;

      if (editMode) {
        modeChip.textContent = "Bearbeiten";
        readView.classList.add("hidden");
        editView.classList.remove("hidden");
        editBtn.classList.add("hidden");
        saveBtn.classList.remove("hidden");
        requestAnimationFrame(() => plantInput.focus());
      } else {
        modeChip.textContent = "Lesemodus";
        readView.classList.remove("hidden");
        editView.classList.add("hidden");
        editBtn.classList.remove("hidden");
        saveBtn.classList.add("hidden");
      }
    }

    function openModal(index) {
      activeIndex = index;
      modalTitle.textContent = `Feld ${index + 1}`;
      setReadValues(index);
      setEditValues(index);
      setMode(false);
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      closePicker();
      activeIndex = null;
      setMode(false);
    }

    function saveActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: plantInput.value.trim(),
        sowDate: sowDateInput.value,
        icon: tempSelectedIcon
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setMode(false);
    }

    function deleteActiveCell() {
      if (activeIndex === null) return;

      cells[activeIndex] = {
        plant: "",
        sowDate: "",
        icon: ""
      };

      saveData();
      renderBoard();
      setReadValues(activeIndex);
      setEditValues(activeIndex);
      setMode(false);
    }

    function renderIconPicker() {
      iconGrid.innerHTML = "";

      ICONS.forEach(item => {
        const option = document.createElement("button");
        option.type = "button";
        option.className = "icon-option";
        if (item.value === tempSelectedIcon) {
          option.classList.add("selected");
        }

        option.innerHTML = `
          <div class="icon-symbol">${escapeHtml(item.symbol)}</div>
          <div class="icon-label">${escapeHtml(item.label)}</div>
        `;

        option.addEventListener("click", () => {
          tempSelectedIcon = item.value;
          updateSelectedIconPreview();
          renderIconPicker();
          closePicker();
        });

        iconGrid.appendChild(option);
      });
    }

    function openPicker() {
      renderIconPicker();
      pickerBackdrop.classList.add("open");
    }

    function closePicker() {
      pickerBackdrop.classList.remove("open");
    }

    editBtn.addEventListener("click", () => setMode(true));
    saveBtn.addEventListener("click", saveActiveCell);
    deleteBtn.addEventListener("click", deleteActiveCell);

    closeModalBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);

    openIconPickerBtn.addEventListener("click", openPicker);
    closePickerBtn.addEventListener("click", closePicker);
    cancelPickerBtn.addEventListener("click", closePicker);

    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModal();
    });

    pickerBackdrop.addEventListener("click", event => {
      if (event.target === pickerBackdrop) closePicker();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        if (pickerBackdrop.classList.contains("open")) {
          closePicker();
          return;
        }
        if (modalBackdrop.classList.contains("open")) {
          closeModal();
        }
      }
    });

    formatToday();
    renderBoard();
  </script>
</body>
</html>
