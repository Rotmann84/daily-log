<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Softdrink-Tracker" />
  <title>Softdrink-Tracker</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2b;
      --card-2: #172133;
      --text: #eef2ff;
      --muted: #aab4c8;
      --line: rgba(255,255,255,.08);
      --green: #198754;
      --green-2: #146c43;
      --red: #b42318;
      --red-2: #8f1c13;
      --open: #4b5563;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
      --radius: 18px;
      --max: 760px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body { min-height: 100vh; }

    .app {
      max-width: var(--max);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .icon-bar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-size: 1.05rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .icon-btn:active { transform: scale(.98); }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }

    .hero-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hero-btn {
      min-height: 72px;
      border: 0;
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 14px 12px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.18);
    }

    .hero-btn:active { transform: translateY(1px); }
    .btn-green { background: linear-gradient(180deg, var(--green), var(--green-2)); }
    .btn-red { background: linear-gradient(180deg, var(--red), var(--red-2)); }

    .today-line {
      text-align: center;
      color: var(--muted);
      font-size: .96rem;
      line-height: 1.5;
    }

    .today-line strong { color: var(--text); }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .series-lines {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 0 0;
    }

    .series-line {
      font-size: 1rem;
      line-height: 1.45;
      color: var(--muted);
      word-break: break-word;
    }

    .series-line strong {
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
    }

    .ten-day-wrap {
      display: none;
      padding-top: 2px;
    }

    .ten-day-row {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 6px;
    }

    .day-box {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .92rem;
      font-weight: 700;
      background: rgba(255,255,255,.03);
    }

    .day-box.green { background: rgba(25,135,84,.18); color: #7ef0b3; }
    .day-box.red { background: rgba(180,35,24,.18); color: #ff8e85; }
    .day-box.open { background: rgba(107,114,128,.18); color: #d1d5db; }

    details {
      border-radius: 14px;
      background: var(--card-2);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 700;
      user-select: none;
      position: relative;
    }

    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      transition: transform .15s ease;
    }

    details[open] summary::after { transform: translateY(-50%) rotate(180deg); }
    .details-body { padding: 0 16px 16px; }

    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
    }

    .stat-row .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .stat-row .label {
      color: var(--muted);
      font-size: .92rem;
      font-weight: 600;
    }

    .stat-row .value {
      font-size: 1.02rem;
      font-weight: 800;
      color: var(--text);
    }

    .stat-row .sub {
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.4;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,.03);
    }

    .history-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .history-date {
      font-weight: 700;
      font-size: .95rem;
    }

    .badge {
      font-size: .78rem;
      padding: 5px 8px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.green { background: rgba(25,135,84,.18); color: #8ef5bb; }
    .badge.red { background: rgba(180,35,24,.18); color: #ff9a92; }
    .badge.open { background: rgba(107,114,128,.22); color: #d5d9df; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .seg-btn {
      min-height: 42px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .seg-btn.active-green { border-color: rgba(25,135,84,.55); background: rgba(25,135,84,.18); }
    .seg-btn.active-red { border-color: rgba(180,35,24,.55); background: rgba(180,35,24,.18); }
    .seg-btn.active-open { border-color: rgba(107,114,128,.55); background: rgba(107,114,128,.2); }

    .comment-wrap {
      margin-top: 10px;
      display: none;
    }

    .comment-wrap.show { display: block; }

    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 13px;
      font: inherit;
      min-height: 86px;
      resize: vertical;
    }

    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    .small-btn {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .small-btn.primary { background: rgba(255,255,255,.1); }
    .hidden { display: none !important; }

    @media (max-width: 560px) {
      .hero-buttons {
        grid-template-columns: 1fr;
      }

      .title { font-size: 1.4rem; }
      .series-line { font-size: .97rem; }
      .series-line strong { font-size: .97rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">Softdrink-Tracker</div>
      <div class="icon-bar">
        <button class="icon-btn" id="importBtn" title="Importieren" aria-label="Importieren">⤓</button>
        <button class="icon-btn" id="exportBtn" title="Exportieren" aria-label="Exportieren">⤒</button>
        <button class="icon-btn" id="deleteBtn" title="Daten löschen" aria-label="Daten löschen">🗑️</button>
      </div>
    </div>

    <div class="card">
      <div class="hero-buttons">
        <button class="hero-btn btn-green" id="noSoftdrinkBtn">Kein Softdrink</button>
        <button class="hero-btn btn-red" id="softdrinkBtn">Softdrink</button>
      </div>
      <div class="today-line" id="todayLine"></div>
    </div>

    <div class="card hidden" id="seriesCard">
      <h2 class="section-title">Serien</h2>
      <div class="series-lines">
        <div class="series-line" id="currentSeriesLine">Aktuelle Serie: <strong>0 Tage</strong></div>
        <div class="series-line" id="bestSeriesLine">Längste Serie: <strong>0 Tage</strong></div>
      </div>
    </div>

    <div class="card ten-day-wrap" id="tenDayWrap">
      <div class="ten-day-row" id="tenDayRow"></div>
    </div>

    <div class="card" id="statsCard">
      <details id="statsDetails">
        <summary>Gesamtstatistik</summary>
        <div class="details-body">
          <div class="stats-list" id="statsList"></div>
        </div>
      </details>
    </div>

    <div class="card hidden" id="historyCard">
      <details>
        <summary>Historie (letzte 21 Tage)</summary>
        <div class="details-body">
          <div class="history-list" id="historyList"></div>
        </div>
      </details>
    </div>

    <input type="file" id="fileInput" accept=".csv,text/csv" class="hidden" />
  </div>

  <script>
    const STORAGE_KEY = 'softdrinkTrackerData_v2';
    const LEGACY_STORAGE_KEY = 'softdrinkTrackerData_v1';
    const COMMENT_LABEL = 'Kommentar';
    const TRACKER_STARTS = {
      2026: '2026-04-20'
    };

    function todayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDateDE(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, (m || 1) - 1, d || 1);
      return dt.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function formatShortDE(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return `${d}.${m}.${y}`;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function migrateLegacyData() {
      const hasCurrent = localStorage.getItem(STORAGE_KEY);
      if (hasCurrent) return;
      const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (!legacy) return;
      localStorage.setItem(STORAGE_KEY, legacy);
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return (parsed && typeof parsed === 'object') ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getSortedKeys(data) {
      return Object.keys(data)
        .filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k))
        .sort();
    }

    function hasTrackedDays(data) {
      return getSortedKeys(data).length > 0;
    }

    function setStatus(dateKey, status, comment = '') {
      const data = loadData();
      if (status === 'open') {
        delete data[dateKey];
      } else {
        data[dateKey] = { status, comment: status === 'yes' ? String(comment || '').trim() : '' };
      }
      saveData(data);
      render();
    }

    function getEntry(data, dateKey) {
      return data[dateKey] || null;
    }

    function getTodayStatusText(data) {
      const entry = getEntry(data, todayKey());
      if (!entry) return 'Offen';
      if (entry.status === 'no') return 'Kein Softdrink';
      if (entry.status === 'yes') return 'Softdrink';
      return 'Offen';
    }

    function shiftDateString(dateStr, offsetDays) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + offsetDays);
      const yy = dt.getFullYear();
      const mm = String(dt.getMonth() + 1).padStart(2, '0');
      const dd = String(dt.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }

    function computeCounts(keys, data) {
      let no = 0;
      let yes = 0;
      for (const k of keys) {
        const status = data[k]?.status;
        if (status === 'no') no++;
        if (status === 'yes') yes++;
      }
      const total = keys.length;
      const quote = total ? Math.round((no / total) * 100) : 0;
      return { total, no, yes, quote };
    }

    function computeStreaks(data) {
      const keys = getSortedKeys(data);
      let currentRun = 0;
      let bestRun = 0;
      let bestRunEnd = null;

      for (const k of keys) {
        const status = data[k]?.status;
        if (status === 'no') {
          currentRun++;
          if (currentRun > bestRun) {
            bestRun = currentRun;
            bestRunEnd = k;
          }
        } else {
          currentRun = 0;
        }
      }

      let current = 0;
      let start = null;
      for (let i = keys.length - 1; i >= 0; i--) {
        const k = keys[i];
        if (data[k]?.status === 'no') {
          current++;
          start = k;
        } else {
          break;
        }
      }

      return {
        current,
        currentStart: start,
        best: bestRun,
        bestEnd: bestRunEnd,
        bestStart: (bestRun && bestRunEnd) ? shiftDateString(bestRunEnd, -(bestRun - 1)) : null
      };
    }

    function getYearStats(data) {
      const keys = getSortedKeys(data);
      const years = [...new Set(keys.map(k => Number(k.slice(0, 4))))].sort((a, b) => a - b);
      const rows = [];

      rows.push({
        label: 'Gesamt (alle Jahre)',
        sub: null,
        ...computeCounts(keys, data)
      });

      for (const year of years) {
        const yearKeys = keys.filter(k => Number(k.slice(0, 4)) === year);
        const startMarker = TRACKER_STARTS[year] || null;
        rows.push({
          label: startMarker ? `${year} (seit ${formatShortDE(startMarker)})` : `${year}`,
          sub: startMarker ? `Jahresstatistik ab Tracker-Start ${formatShortDE(startMarker)}` : 'Eigenständige Jahresstatistik',
          ...computeCounts(yearKeys, data)
        });
      }

      return rows;
    }

    function renderStats(data) {
      const list = document.getElementById('statsList');
      list.innerHTML = '';
      const rows = getYearStats(data);

      for (const row of rows) {
        const el = document.createElement('div');
        el.className = 'stat-row';
        el.innerHTML = `
          <div class="top">
            <div class="label">${escapeHtml(row.label)}</div>
            <div class="value">${row.no} / ${row.total}</div>
          </div>
          <div class="sub">${row.no} softdrinkfrei · ${row.yes} mit Softdrink · Quote ${row.quote} %${row.sub ? `<br>${escapeHtml(row.sub)}` : ''}</div>
        `;
        list.appendChild(el);
      }
    }

    function buildTenDayDisplay(data) {
      const row = document.getElementById('tenDayRow');
      row.innerHTML = '';
      const today = todayKey();

      for (let offset = -9; offset <= 0; offset++) {
        const key = shiftDateString(today, offset);
        const entry = data[key];
        const box = document.createElement('div');
        let cls = 'open';
        let symbol = '?';

        if (entry?.status === 'no') {
          cls = 'green';
          symbol = '✓';
        } else if (entry?.status === 'yes') {
          cls = 'red';
          symbol = '✕';
        }

        box.className = `day-box ${cls}`;
        box.textContent = symbol;
        box.title = `${formatShortDE(key)} – ${entry?.status === 'no' ? 'Kein Softdrink' : entry?.status === 'yes' ? 'Softdrink' : 'Offen'}`;
        row.appendChild(box);
      }
    }

    function renderHistory(data) {
      const list = document.getElementById('historyList');
      list.innerHTML = '';
      const today = todayKey();
      const items = [];

      for (let offset = 0; offset < 21; offset++) {
        const key = shiftDateString(today, -offset);
        const entry = data[key] || null;
        items.push({ key, entry });
      }

      for (const { key, entry } of items) {
        const status = entry?.status || 'open';
        const comment = entry?.comment || '';

        const wrap = document.createElement('div');
        wrap.className = 'history-item';

        wrap.innerHTML = `
          <div class="history-top">
            <div class="history-date">${escapeHtml(formatDateDE(key))}</div>
            <div class="badge ${status === 'no' ? 'green' : status === 'yes' ? 'red' : 'open'}">${status === 'no' ? 'Kein Softdrink' : status === 'yes' ? 'Softdrink' : 'Offen'}</div>
          </div>
          <div class="segmented">
            <button class="seg-btn ${status === 'no' ? 'active-green' : ''}" data-date="${key}" data-status="no">Kein</button>
            <button class="seg-btn ${status === 'yes' ? 'active-red' : ''}" data-date="${key}" data-status="yes">Softdrink</button>
            <button class="seg-btn ${status === 'open' ? 'active-open' : ''}" data-date="${key}" data-status="open">Offen</button>
          </div>
          <div class="comment-wrap ${status === 'yes' ? 'show' : ''}" id="comment-wrap-${key}">
            <textarea id="comment-${key}" placeholder="Optionaler Kommentar oder Anlass">${escapeHtml(comment)}</textarea>
            <div class="row-actions">
              <button class="small-btn primary" data-save-comment="${key}">Speichern</button>
            </div>
          </div>
        `;

        list.appendChild(wrap);
      }

      list.querySelectorAll('[data-status]').forEach(btn => {
        btn.addEventListener('click', () => {
          const date = btn.getAttribute('data-date');
          const status = btn.getAttribute('data-status');
          if (status === 'yes') {
            const existing = loadData()[date]?.comment || '';
            setStatus(date, 'yes', existing);
          } else if (status === 'no') {
            setStatus(date, 'no');
          } else {
            setStatus(date, 'open');
          }
        });
      });

      list.querySelectorAll('[data-save-comment]').forEach(btn => {
        btn.addEventListener('click', () => {
          const date = btn.getAttribute('data-save-comment');
          const text = document.getElementById(`comment-${date}`).value.trim();
          setStatus(date, 'yes', text);
        });
      });
    }

    function render() {
      const data = loadData();
      const streaks = computeStreaks(data);
      const tracked = hasTrackedDays(data);

      document.getElementById('todayLine').innerHTML = `${escapeHtml(formatDateDE(todayKey()))}<br><strong>Status heute: ${escapeHtml(getTodayStatusText(data))}</strong>`;
      renderStats(data);

      const seriesCard = document.getElementById('seriesCard');
      const tenDayWrap = document.getElementById('tenDayWrap');
      const historyCard = document.getElementById('historyCard');

      if (tracked) {
        seriesCard.classList.remove('hidden');
        tenDayWrap.style.display = 'block';
        historyCard.classList.remove('hidden');

        document.getElementById('currentSeriesLine').innerHTML = streaks.current > 0 && streaks.currentStart
          ? `Aktuelle Serie: <strong>${streaks.current} ${streaks.current === 1 ? 'Tag' : 'Tage'}</strong> (seit: ${escapeHtml(formatShortDE(streaks.currentStart))})`
          : `Aktuelle Serie: <strong>0 Tage</strong>`;

        document.getElementById('bestSeriesLine').innerHTML = streaks.best > 0 && streaks.bestStart && streaks.bestEnd
          ? `Längste Serie: <strong>${streaks.best} ${streaks.best === 1 ? 'Tag' : 'Tage'}</strong> (Zeitraum: ${escapeHtml(formatShortDE(streaks.bestStart))} – ${escapeHtml(formatShortDE(streaks.bestEnd))})`
          : `Längste Serie: <strong>0 Tage</strong>`;

        buildTenDayDisplay(data);
        renderHistory(data);
      } else {
        seriesCard.classList.add('hidden');
        tenDayWrap.style.display = 'none';
        historyCard.classList.add('hidden');
        document.getElementById('currentSeriesLine').innerHTML = 'Aktuelle Serie: <strong>0 Tage</strong>';
        document.getElementById('bestSeriesLine').innerHTML = 'Längste Serie: <strong>0 Tage</strong>';
      }
    }

    function exportCsv() {
      const data = loadData();
      const keys = getSortedKeys(data);
      const lines = [['Datum', 'Softdrink', COMMENT_LABEL]];

      for (const k of keys) {
        const entry = data[k];
        const val = entry?.status === 'yes' ? 'ja' : entry?.status === 'no' ? 'nein' : '';
        const comment = entry?.status === 'yes' ? (entry.comment || '') : '';
        lines.push([k, val, comment]);
      }

      const csv = lines.map(row => row.map(csvEscape).join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = todayKey().replaceAll('-', '');
      a.href = url;
      a.download = `softdrink-tracker-export-${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      if (/[";\n]/.test(str)) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ';') {
            row.push(cell);
            cell = '';
          } else if (ch === '\n') {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          } else if (ch === '\r') {
          } else {
            cell += ch;
          }
        }
      }

      row.push(cell);
      if (row.some(v => v !== '')) rows.push(row);
      return rows;
    }

    function importCsv(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = String(reader.result || '');
          const rows = parseCsv(text);
          if (!rows.length) {
            alert('Die CSV-Datei ist leer.');
            return;
          }

          const header = rows[0].map(h => String(h || '').trim().toLowerCase());
          const dateIdx = header.indexOf('datum');
          const statusIdx = header.indexOf('softdrink');
          const commentIdx = header.findIndex(h => h === 'kommentar' || h === 'anlass');

          if (dateIdx === -1 || statusIdx === -1) {
            alert('Ungültige CSV. Erwartet werden mindestens die Spalten „Datum“ und „Softdrink“.');
            return;
          }

          const imported = {};
          for (let i = 1; i < rows.length; i++) {
            const cols = rows[i];
            const date = String(cols[dateIdx] || '').trim();
            const rawStatus = String(cols[statusIdx] || '').trim().toLowerCase();
            const comment = commentIdx >= 0 ? String(cols[commentIdx] || '').trim() : '';

            if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
            if (rawStatus === 'ja') {
              imported[date] = { status: 'yes', comment };
            } else if (rawStatus === 'nein') {
              imported[date] = { status: 'no', comment: '' };
            }
          }

          saveData(imported);
          render();
          alert('Import erfolgreich.');
        } catch {
          alert('Import fehlgeschlagen. Bitte CSV prüfen.');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    document.getElementById('noSoftdrinkBtn').addEventListener('click', () => {
      setStatus(todayKey(), 'no');
    });

    document.getElementById('softdrinkBtn').addEventListener('click', () => {
      const data = loadData();
      const existing = data[todayKey()]?.comment || '';
      const comment = prompt('Optionaler Kommentar oder Anlass:', existing);
      if (comment === null) {
        setStatus(todayKey(), 'yes', existing);
      } else {
        setStatus(todayKey(), 'yes', comment);
      }
    });

    document.getElementById('exportBtn').addEventListener('click', exportCsv);
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) importCsv(file);
      e.target.value = '';
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      const ok = confirm('Wirklich alle Daten löschen?');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
      render();
    });

    migrateLegacyData();
    render();
  </script>
</body>
</html>
