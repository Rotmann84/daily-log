<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Softdrink-Tracker" />
  <title>Softdrink-Tracker</title>
  <style>
    :root{
      --bg1:#071225;
      --bg2:#0b1830;
      --card:#101b31;
      --card-soft:rgba(255,255,255,.03);
      --line:rgba(255,255,255,.08);
      --text:#eef2ff;
      --muted:#aeb8cc;
      --green:#198754;
      --green2:#136c43;
      --red:#c11a12;
      --red2:#9d160f;
      --open:#4b5563;
      --shadow:0 12px 32px rgba(0,0,0,.28);
      --radius:22px;
      --max:760px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(14,52,119,.22), transparent 38%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    body{min-height:100vh}

    .app{
      max-width:var(--max);
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }
    .title{
      font-size:1.5rem;
      font-weight:800;
      letter-spacing:.2px;
    }
    .icon-bar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }
    .icon-btn{
      width:38px;
      height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.05rem;
      cursor:pointer;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .icon-btn:active{transform:scale(.98)}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
      backdrop-filter:blur(8px);
    }

    .hero-buttons{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:18px;
    }
    .hero-btn{
      border:0;
      min-height:84px;
      border-radius:18px;
      padding:16px 14px;
      color:#fff;
      font-size:1.1rem;
      font-weight:800;
      cursor:pointer;
      box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);
    }
    .btn-green{background:linear-gradient(180deg,var(--green),var(--green2))}
    .btn-red{background:linear-gradient(180deg,var(--red),var(--red2))}
    .hero-btn:active{transform:translateY(1px)}

    .today-line{
      text-align:center;
      line-height:1.55;
      color:var(--muted);
      font-size:1rem;
    }
    .today-line strong{color:var(--text)}

    .hidden{display:none!important}

    .section-title{
      margin:0 0 12px;
      font-size:1rem;
      font-weight:800;
    }

    .series-block{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-top:2px;
    }
    .series-item{
      padding-bottom:12px;
      border-bottom:1px solid var(--line);
    }
    .series-item:last-child{
      padding-bottom:0;
      border-bottom:0;
    }
    .series-main{
      color:var(--muted);
      font-size:1rem;
      line-height:1.4;
    }
    .series-main strong{
      color:var(--text);
      font-size:1rem;
      font-weight:800;
    }
    .series-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.35;
    }

    .ten-day-wrap{display:none}
    .ten-day-row{
      display:grid;
      grid-template-columns:repeat(10, minmax(0,1fr));
      gap:8px;
    }
    .day-box{
      aspect-ratio:1 / 1;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.1rem;
      font-weight:800;
      background:rgba(255,255,255,.03);
      color:#d7dbe7;
      user-select:none;
    }
    .day-box.no{
      background:rgba(25,135,84,.18);
      color:#65e0a1;
      border-color:rgba(25,135,84,.35);
    }
    .day-box.yes{
      background:rgba(193,26,18,.18);
      color:#ff8d86;
      border-color:rgba(193,26,18,.35);
    }
    .day-box.open{
      color:#d2d7e2;
      background:rgba(255,255,255,.03);
    }
    .ten-day-label{
      margin-top:12px;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
    }

    details{
      border-radius:16px;
      overflow:hidden;
    }
    summary{
      list-style:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size:1rem;
      font-weight:800;
      color:var(--text);
    }
    summary::-webkit-details-marker{display:none}
    summary::after{
      content:"▾";
      color:var(--muted);
      font-size:1rem;
      transition:transform .18s ease;
    }
    details[open] summary::after{transform:rotate(180deg)}
    .details-body{padding-top:14px}

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .stat-box{
      padding:12px;
      border-radius:14px;
      background:var(--card-soft);
      border:1px solid var(--line);
    }
    .stat-box .k{
      color:var(--muted);
      font-size:.84rem;
      line-height:1.35;
      margin-bottom:6px;
    }
    .stat-box .v{
      color:var(--text);
      font-size:1.08rem;
      font-weight:800;
    }
    .stats-divider{
      height:1px;
      background:var(--line);
      margin:14px 0 10px;
    }
    .year-stats-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .year-stat-item{
      padding:12px;
      border-radius:14px;
      background:var(--card-soft);
      border:1px solid var(--line);
    }
    .year-stat-title{
      color:var(--text);
      font-size:.95rem;
      font-weight:700;
      margin-bottom:6px;
    }
    .year-stat-sub{
      color:var(--muted);
      font-size:.9rem;
      line-height:1.35;
    }

    .history-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .history-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:rgba(255,255,255,.03);
    }
    .history-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .history-date{
      font-weight:700;
      font-size:.95rem;
    }
    .badge{
      font-size:.78rem;
      padding:5px 8px;
      border-radius:999px;
      font-weight:800;
      white-space:nowrap;
    }
    .badge.green{background:rgba(25,135,84,.18); color:#65e0a1; border:1px solid rgba(25,135,84,.35)}
    .badge.red{background:rgba(193,26,18,.18); color:#ff8d86; border:1px solid rgba(193,26,18,.35)}
    .badge.open{background:rgba(255,255,255,.07); color:#d7dbe7; border:1px solid rgba(255,255,255,.1)}

    .history-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .small-btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      min-height:40px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    .small-btn.green{background:rgba(25,135,84,.14)}
    .small-btn.red{background:rgba(193,26,18,.14)}

    .comment-wrap{
      margin-top:10px;
      display:none;
    }
    .comment-wrap.show{display:block}
    .comment-wrap label{
      display:block;
      font-size:.82rem;
      color:var(--muted);
      margin-bottom:6px;
    }
    .comment-input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:11px 12px;
      font:inherit;
      min-height:44px;
      outline:none;
    }

    @media (max-width:540px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .title{font-size:1.38rem}
      .hero-btn{min-height:78px; font-size:1.02rem}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">Softdrink-Tracker</div>
      <div class="icon-bar">
        <button class="icon-btn" id="importBtn" title="Importieren" aria-label="Importieren">↓</button>
        <button class="icon-btn" id="exportBtn" title="Exportieren" aria-label="Exportieren">↑</button>
        <button class="icon-btn" id="deleteBtn" title="Daten löschen" aria-label="Daten löschen">🗑️</button>
      </div>
    </div>

    <div class="card">
      <div class="hero-buttons">
        <button class="hero-btn btn-green" id="noSoftdrinkBtn">Kein Softdrink</button>
        <button class="hero-btn btn-red" id="softdrinkBtn">Softdrink</button>
      </div>
      <div class="today-line" id="todayLine"></div>
    </div>

    <div class="card hidden" id="seriesCard">
      <h2 class="section-title">Serien</h2>
      <div class="series-block">
        <div class="series-item">
          <div class="series-main">Aktuelle Serie: <strong><span id="currentStreakValue">0</span> Tag(e)</strong></div>
          <div class="series-sub" id="currentStreakSub">Noch keine Daten</div>
        </div>
        <div class="series-item">
          <div class="series-main">Längste Serie: <strong><span id="bestStreakValue">0</span> Tag(e)</strong></div>
          <div class="series-sub" id="bestStreakSub">Noch keine Daten</div>
        </div>
      </div>
    </div>

    <div class="card ten-day-wrap" id="tenDayWrap">
      <div class="ten-day-row" id="tenDayRow"></div>
      <div class="ten-day-label">Letzte 10 Tage</div>
    </div>

    <div class="card" id="statsCard">
      <details id="statsDetails">
        <summary>Gesamtstatistik</summary>
        <div class="details-body">
          <div class="stats-grid">
            <div class="stat-box">
              <div class="k">Erfasste Tage</div>
              <div class="v" id="totalTrackedDays">0</div>
            </div>
            <div class="stat-box">
              <div class="k">Softdrinkfrei</div>
              <div class="v" id="totalNoValue">0</div>
            </div>
            <div class="stat-box">
              <div class="k">Mit Softdrink</div>
              <div class="v" id="totalYesValue">0</div>
            </div>
            <div class="stat-box">
              <div class="k">Softdrinkfreie Quote</div>
              <div class="v" id="quoteValue">0 %</div>
            </div>
          </div>
          <div class="stats-divider"></div>
          <div class="year-stats-list" id="yearStatsList"></div>
        </div>
      </details>
    </div>

    <div class="card hidden" id="historyCard">
      <details open>
        <summary>Historie (letzte 21 Tage)</summary>
        <div class="details-body">
          <div class="history-list" id="historyList"></div>
        </div>
      </details>
    </div>

    <input type="file" id="fileInput" accept=".csv,text/csv" class="hidden" />
  </div>

  <script>
    const STORAGE_KEY = 'softdrinkTrackerData';
    const COMMENT_LABEL = 'Kommentar';
    const TRACKING_START_2026 = '2026-04-20';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const data = raw ? JSON.parse(raw) : {};
        return data && typeof data === 'object' ? data : {};
      } catch {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function todayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function dateKeyFromDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function parseDateKey(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function shiftDateString(dateStr, offsetDays) {
      const d = parseDateKey(dateStr);
      d.setDate(d.getDate() + offsetDays);
      return dateKeyFromDate(d);
    }

    function formatDateDE(dateStr) {
      const d = parseDateKey(dateStr);
      return d.toLocaleDateString('de-DE', {
        weekday: 'long',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function formatShortDE(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return `${d}.${m}.${y}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getSortedKeys(data) {
      return Object.keys(data)
        .filter(k => data[k] && (data[k].status === 'no' || data[k].status === 'yes'))
        .sort();
    }

    function hasTrackedDays(data) {
      return getSortedKeys(data).length > 0;
    }

    function getEntry(data, key) {
      return data[key] || null;
    }

    function setStatus(dateKey, status, comment = '') {
      const data = loadData();
      if (status === 'open') {
        delete data[dateKey];
      } else {
        data[dateKey] = {
          status,
          comment: status === 'yes' ? String(comment || '').trim() : ''
        };
      }
      saveData(data);
      render();
    }

    function getTodayStatusText(data) {
      const entry = getEntry(data, todayKey());
      if (!entry) return 'Offen';
      return entry.status === 'no' ? 'Kein Softdrink' : 'Softdrink';
    }

    function computeStatsForKeys(data, keys) {
      let no = 0, yes = 0;
      for (const k of keys) {
        const status = data[k]?.status;
        if (status === 'no') no++;
        if (status === 'yes') yes++;
      }
      const total = keys.length;
      const quote = total ? Math.round((no / total) * 100) : 0;
      return { total, no, yes, quote };
    }

    function computeStats(data) {
      const keys = getSortedKeys(data);
      return {
        keys,
        ...computeStatsForKeys(data, keys)
      };
    }

    function computeStreaks(data) {
      const keys = getSortedKeys(data);
      let current = 0;
      let currentStart = '';
      let best = 0;
      let bestStart = '';
      let bestEnd = '';

      let running = 0;
      let runningStart = '';

      for (const key of keys) {
        const status = data[key]?.status;
        if (status === 'no') {
          if (running === 0) runningStart = key;
          running++;
          if (running > best) {
            best = running;
            bestStart = runningStart;
            bestEnd = key;
          }
        } else {
          running = 0;
          runningStart = '';
        }
      }

      const tKey = todayKey();
      let cursor = tKey;
      while (data[cursor]?.status === 'no') {
        current++;
        currentStart = cursor;
        cursor = shiftDateString(cursor, -1);
      }

      return { current, currentStart, best, bestStart, bestEnd };
    }

    function buildTenDayDisplay(data) {
      const row = document.getElementById('tenDayRow');
      row.innerHTML = '';
      const today = todayKey();
      const start = shiftDateString(today, -9);

      for (let i = 0; i < 10; i++) {
        const key = shiftDateString(start, i);
        const status = data[key]?.status || 'open';
        const box = document.createElement('div');
        box.className = `day-box ${status}`;
        box.textContent = status === 'no' ? '✓' : status === 'yes' ? '✕' : '?';
        row.appendChild(box);
      }
    }

    function getYearTrackingStart(year) {
      if (year === 2026) return TRACKING_START_2026;
      return `${year}-01-01`;
    }

    function getVisibleStatisticYears() {
      const currentYear = new Date().getFullYear();
      const years = [];
      for (let y = 2026; y <= currentYear; y++) years.push(y);
      return years;
    }

    function computeYearStat(data, year) {
      const start = getYearTrackingStart(year);
      const end = `${year}-12-31`;
      const keys = getSortedKeys(data).filter(k => k >= start && k <= end);
      return {
        year,
        start,
        ...computeStatsForKeys(data, keys)
      };
    }

    function renderYearStats(data) {
      const wrap = document.getElementById('yearStatsList');
      const years = getVisibleStatisticYears();
      wrap.innerHTML = years.map(year => {
        const stat = computeYearStat(data, year);
        const title = `${year} (seit ${formatShortDE(stat.start)})`;
        const text = stat.total > 0
          ? `${stat.no} von ${stat.total} Tagen softdrinkfrei (${stat.quote} %)`
          : 'Noch keine Daten';
        return `
          <div class="year-stat-item">
            <div class="year-stat-title">${escapeHtml(title)}</div>
            <div class="year-stat-sub">${escapeHtml(text)}</div>
          </div>
        `;
      }).join('');
    }

    function renderHistory(data) {
      const list = document.getElementById('historyList');
      list.innerHTML = '';
      const today = todayKey();

      for (let offset = 0; offset < 21; offset++) {
        const key = shiftDateString(today, -offset);
        const entry = data[key];
        const status = entry?.status || 'open';
        const wrap = document.createElement('div');
        wrap.className = 'history-item';

        const commentBlock = status === 'yes' ? `
          <div class="comment-wrap show" id="comment-wrap-${key}">
            <label for="comment-${key}">${COMMENT_LABEL}</label>
            <input class="comment-input" id="comment-${key}" type="text" value="${escapeHtml(entry?.comment || '')}" placeholder="Optionaler Kommentar" />
          </div>
        ` : `
          <div class="comment-wrap" id="comment-wrap-${key}">
            <label for="comment-${key}">${COMMENT_LABEL}</label>
            <input class="comment-input" id="comment-${key}" type="text" value="" placeholder="Optionaler Kommentar" />
          </div>
        `;

        wrap.innerHTML = `
          <div class="history-top">
            <div class="history-date">${escapeHtml(offset === 0 ? 'Heute' : formatDateDE(key))}</div>
            <div class="badge ${status === 'no' ? 'green' : status === 'yes' ? 'red' : 'open'}">
              ${status === 'no' ? 'Kein Softdrink' : status === 'yes' ? 'Softdrink' : 'Offen'}
            </div>
          </div>
          ${commentBlock}
          <div class="history-actions">
            <button class="small-btn green" data-date="${key}" data-action="no">Kein Softdrink</button>
            <button class="small-btn red" data-date="${key}" data-action="yes">Softdrink</button>
            <button class="small-btn" data-date="${key}" data-action="open">Offen</button>
          </div>
        `;
        list.appendChild(wrap);
      }

      list.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const date = btn.dataset.date;
          const action = btn.dataset.action;
          if (action === 'open') {
            setStatus(date, 'open');
            return;
          }
          if (action === 'no') {
            setStatus(date, 'no', '');
            return;
          }
          const input = document.getElementById(`comment-${date}`);
          const comment = input ? input.value.trim() : '';
          setStatus(date, 'yes', comment);
        });
      });
    }

    function exportCsv() {
      const data = loadData();
      const keys = getSortedKeys(data);
      const lines = [['Datum', 'Softdrink', COMMENT_LABEL]];
      for (const k of keys) {
        const entry = data[k];
        const val = entry?.status === 'yes' ? 'ja' : entry?.status === 'no' ? 'nein' : '';
        const comment = entry?.status === 'yes' ? (entry.comment || '') : '';
        lines.push([k, val, comment]);
      }

      const csv = lines.map(row => row.map(csvEscape).join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = todayKey().replaceAll('-', '');
      a.href = url;
      a.download = `softdrink-tracker-export-${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      if (/[";\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
      return str;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ';') {
            row.push(cell);
            cell = '';
          } else if (ch === '\n') {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          } else if (ch !== '\r') {
            cell += ch;
          }
        }
      }

      row.push(cell);
      if (row.length > 1 || row[0] !== '') rows.push(row);
      return rows;
    }

    function importCsvText(text) {
      const rows = parseCsv(text);
      if (!rows.length) throw new Error('CSV leer');

      const header = rows[0].map(v => String(v || '').trim().toLowerCase());
      const dateIdx = header.findIndex(v => v === 'datum');
      const statusIdx = header.findIndex(v => v === 'softdrink');
      const commentIdx = header.findIndex(v => v === COMMENT_LABEL.toLowerCase());

      if (dateIdx === -1 || statusIdx === -1) {
        throw new Error('CSV-Format ungültig');
      }

      const data = {};
      for (let i = 1; i < rows.length; i++) {
        const cols = rows[i];
        const date = String(cols[dateIdx] || '').trim();
        const rawStatus = String(cols[statusIdx] || '').trim().toLowerCase();
        const comment = commentIdx >= 0 ? String(cols[commentIdx] || '').trim() : '';

        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;

        if (rawStatus === 'nein') {
          data[date] = { status: 'no', comment: '' };
        } else if (rawStatus === 'ja') {
          data[date] = { status: 'yes', comment };
        }
      }

      saveData(data);
      render();
    }

    function render() {
      const data = loadData();
      const stats = computeStats(data);
      const streaks = computeStreaks(data);
      const tracked = hasTrackedDays(data);

      document.getElementById('todayLine').innerHTML =
        `${escapeHtml(formatDateDE(todayKey()))}<br><strong>Status heute: ${escapeHtml(getTodayStatusText(data))}</strong>`;

      document.getElementById('totalTrackedDays').textContent = String(stats.total);
      document.getElementById('totalNoValue').textContent = String(stats.no);
      document.getElementById('totalYesValue').textContent = String(stats.yes);
      document.getElementById('quoteValue').textContent = `${stats.quote} %`;

      renderYearStats(data);

      const seriesCard = document.getElementById('seriesCard');
      const tenDayWrap = document.getElementById('tenDayWrap');
      const historyCard = document.getElementById('historyCard');

      if (tracked) {
        seriesCard.classList.remove('hidden');
        tenDayWrap.style.display = 'block';
        historyCard.classList.remove('hidden');

        document.getElementById('currentStreakValue').textContent = String(streaks.current);
        document.getElementById('currentStreakSub').textContent =
          streaks.current > 0 && streaks.currentStart
            ? `(seit: ${formatShortDE(streaks.currentStart)})`
            : 'Aktuell keine laufende Serie';

        document.getElementById('bestStreakValue').textContent = String(streaks.best);
        document.getElementById('bestStreakSub').textContent =
          streaks.best > 0 && streaks.bestStart && streaks.bestEnd
            ? `(Zeitraum: ${formatShortDE(streaks.bestStart)} bis ${formatShortDE(streaks.bestEnd)})`
            : 'Noch keine Serie';

        buildTenDayDisplay(data);
        renderHistory(data);
      } else {
        seriesCard.classList.add('hidden');
        tenDayWrap.style.display = 'none';
        historyCard.classList.add('hidden');
        document.getElementById('currentStreakValue').textContent = '0';
        document.getElementById('currentStreakSub').textContent = 'Noch keine Daten';
        document.getElementById('bestStreakValue').textContent = '0';
        document.getElementById('bestStreakSub').textContent = 'Noch keine Daten';
      }
    }

    document.getElementById('noSoftdrinkBtn').addEventListener('click', () => {
      setStatus(todayKey(), 'no', '');
    });

    document.getElementById('softdrinkBtn').addEventListener('click', () => {
      const existing = loadData()[todayKey()];
      const preset = existing?.status === 'yes' ? (existing.comment || '') : '';
      const comment = prompt('Optionaler Kommentar zu Softdrink:', preset);
      if (comment === null) {
        setStatus(todayKey(), 'yes', preset);
      } else {
        setStatus(todayKey(), 'yes', comment);
      }
    });

    document.getElementById('exportBtn').addEventListener('click', exportCsv);

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          importCsvText(String(reader.result || ''));
          alert('Import erfolgreich.');
        } catch (err) {
          alert('Import fehlgeschlagen. Bitte CSV prüfen.');
        } finally {
          e.target.value = '';
        }
      };
      reader.readAsText(file, 'utf-8');
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      const ok = confirm('Wirklich alle Daten löschen?');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    render();
  </script>
</body>
</html>
